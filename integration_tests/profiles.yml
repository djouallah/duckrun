duckrun_integration:
  target: dev
  outputs:
    dev:
      type: duckrun
      # A persistent file (not :memory:) so seeds/models survive across separate
      # dbt invocations (e.g. the second incremental run below).
      path: 'dev.duckdb'
      threads: 1
      # Default Delta location for models that don't set config(location=...).
      root_path: "{{ env_var('DBT_DELTA_ROOT', './warehouse') }}"
      # storage_options: {}   # only needed for remote stores (abfss/s3/gs)
