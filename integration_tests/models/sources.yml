version: 2

sources:
  - name: aemo
    description: External AEMO reference data, read through the duckrun plugin.
    tables:
      # ---- DUID reference CSVs (downloaded by stg_csv_archive_log into FILES_PATH/csv/duid) ----
      - name: duid_data
        description: NEM DUID reference data (region, fuel source, participant).
        meta:
          plugin: duckrun
          format: csv
          location: "{{ env_var('FILES_PATH', '/tmp') }}/csv/duid/duid_data.csv"
      - name: facilities
        description: WA facilities registry (facility code -> participant).
        meta:
          plugin: duckrun
          format: csv
          location: "{{ env_var('FILES_PATH', '/tmp') }}/csv/duid/facilities.csv"
      - name: wa_energy
        description: WA technology mapping per DUID.
        meta:
          plugin: duckrun
          format: csv
          location: "{{ env_var('FILES_PATH', '/tmp') }}/csv/duid/WA_ENERGY.csv"
      - name: geo_data
        description: DUID geolocation (latitude/longitude).
        meta:
          plugin: duckrun
          format: csv
          location: "{{ env_var('FILES_PATH', '/tmp') }}/csv/duid/geo_data.csv"

      # ---- Calendar dimension: external Delta table generated by scripts/generate_calendar.py ----
      - name: dim_calendar
        description: Calendar dimension (external Delta table) with date attributes.
        meta:
          plugin: duckrun
          delta_table_path: "{{ env_var('WAREHOUSE_PATH', '/tmp') }}/sources/dim_calendar"
        columns:
          - name: date
            description: Calendar date
            tests:
              - unique
              - not_null

      # ---- Raw AEMO CSV archives (downloaded by stg_csv_archive_log) ----
      # Lineage-only sources: the marts read these files with a tailored read_csv(...) driven by
      # the log table, so there is no `plugin` meta and nothing is materialized here. Declaring
      # them as sources just records the dependency and draws the node in the DAG.
      - name: daily_report
        description: >
          AEMO Daily_Reports CSVs (each file holds both DUNIT SCADA and DREGION price records).
          Read by fct_scada and fct_price via read_csv with the file list from stg_csv_archive_log.
      - name: scada_today
        description: >
          Intraday Dispatch_SCADA CSVs. Read by fct_scada_today via read_csv with the file list
          from stg_csv_archive_log.
      - name: price_today
        description: >
          Intraday DispatchIS price CSVs. Read by fct_price_today via read_csv with the file list
          from stg_csv_archive_log.
