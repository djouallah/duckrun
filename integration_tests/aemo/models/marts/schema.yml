version: 2

models:
  - name: fct_price
    description: >
      Unified price fact: daily settled DREGION rows MERGED over preliminary intraday DispatchIS
      rows (source_priority 1 beats 0) on REGIONID + SETTLEMENTDATE + INTERVENTION.
    columns:
      - name: source_priority
        description: 1 = daily settled, 0 = intraday preliminary.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]
      - name: REGIONID
        tests:
          - not_null
          - accepted_values:
              values: ['QLD1', 'NSW1', 'VIC1', 'SA1', 'TAS1', 'WA1']
      - name: SETTLEMENTDATE
        tests:
          - not_null
      - name: file
        tests:
          - not_null

  - name: fct_scada
    description: >
      Unified SCADA fact: daily settled DUNIT rows MERGED over preliminary intraday Dispatch_SCADA
      rows (source_priority 1 beats 0) on DUID + SETTLEMENTDATE + INTERVENTION. Intraday-only DUIDs
      (never in settlement) remain as preliminary rows.
    columns:
      - name: source_priority
        description: 1 = daily settled, 0 = intraday preliminary.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]
      - name: DUID
        tests:
          - not_null
          - relationships:
              to: ref('dim_duid')
              field: DUID
              config:
                severity: warn
      - name: SETTLEMENTDATE
        tests:
          - not_null
      - name: file
        tests:
          - not_null

  - name: fct_summary
    description: Combined SCADA and price summary
    columns:
      - name: date
        tests:
          - not_null:
              config:
                tags: [heavy]
      - name: DUID
        tests:
          - not_null:
              config:
                tags: [heavy]
          - relationships:
              to: ref('dim_duid')
              field: DUID
              config:
                tags: [heavy]
      - name: mw
        tests:
          - not_null:
              config:
                tags: [heavy]
      - name: price
        tests:
          - not_null:
              config:
                tags: [heavy]
