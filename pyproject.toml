[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "duckrun"
version = "0.3.9"
description = "A dbt adapter that runs SQL in DuckDB and materializes to Delta Lake (delta_rs)."
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "mim"}
]
requires-python = ">=3.9"
dependencies = [
    "dbt-duckdb>=1.8",
    # Cap out the broken upstream Delta releases until they're fixed:
    #  - duckdb 1.5.2+ bundles a duckdb-delta extension that fails to read a valid log with
    #    "Generic delta kernel error: No files in log segment" (https://github.com/duckdb/
    #    duckdb-delta/issues) — the read side (delta_scan); 1.5.1 is fine.
    #  - deltalake 1.5.1+ has a matching delta-log regression — the write side; 1.5.0 is fine.
    # The deltalake floor is 1.5.0 (not just a ceiling): 1.5.0 is the first release with
    # MERGE disk-spill config (max_spill_size), which engine.merge_delta relies on to cap
    # the merge's RAM and avoid OOM on large upserts. Combined with the <1.5.1 ceiling this
    # pins exactly 1.5.0. Fabric preinstalls an older deltalake that satisfied the old floor,
    # so this also forces the upgrade on `pip install duckrun` instead of needing a manual pin.
    "duckdb>=1.4.4,<1.5.2",
    "deltalake>=1.5.0,<1.5.1",
]

[project.optional-dependencies]
# Test-only; pyarrow is used to build reusable Arrow fixtures. Production duckrun stays
# pyarrow-free (it streams DuckDB relations straight to deltalake).
test = ["pytest>=7", "pyarrow"]
# Spark OCC demonstration test only (heavy: pulls a JVM-backed engine). Kept out of `test`.
spark = ["pyspark>=3.5", "delta-spark>=3.2"]
# Official dbt adapter conformance suite (dbt-labs/dbt-adapters). Subclassed in
# tests/conformance/ to run the standard adapter tests against duckrun.
conformance = ["pytest>=7", "pyarrow", "dbt-tests-adapter"]

[project.urls]
Homepage = "https://github.com/djouallah/duckrun"
Repository = "https://github.com/djouallah/duckrun"
Issues = "https://github.com/djouallah/duckrun/issues"

[tool.setuptools.packages.find]
# dbt uses PEP 420 namespace packages under dbt/adapters and dbt/include.
include = ["dbt", "dbt.*"]
namespaces = true

[tool.setuptools.package-data]
"dbt.include.duckrun" = ["dbt_project.yml", "**/*.sql", "**/*.yml"]
