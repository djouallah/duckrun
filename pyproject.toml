[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "duckrun"
version = "0.3.3"
description = "A dbt adapter that runs SQL in DuckDB and materializes to Delta Lake (delta_rs)."
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "mim"}
]
requires-python = ">=3.9"
dependencies = [
    "dbt-duckdb>=1.8",
    # Cap below 1.5.0 on BOTH the reader and the writer of the Delta log:
    #  - duckdb 1.5.x bundles a duckdb-delta extension that fails to read a valid log with
    #    "Generic delta kernel error: No files in log segment" (https://github.com/duckdb/
    #    duckdb-delta/issues). This is the read side (delta_scan).
    #  - deltalake 1.5.0 has a matching delta-log regression where cleanup_metadata/vacuum
    #    leaves an unreadable log. This is the write side.
    # Both 1.5.x lines are broken, so exclude them until fixed upstream and a plain
    # `pip install duckrun` gets a working read+write delta stack out of the box.
    "duckdb>=1.4.4,<1.5.0",
    "deltalake>=1.2.1,<1.5.0",
]

[project.optional-dependencies]
# Test-only; pyarrow is used to build reusable Arrow fixtures. Production duckrun stays
# pyarrow-free (it streams DuckDB relations straight to deltalake).
test = ["pytest>=7", "pyarrow"]
# Spark OCC demonstration test only (heavy: pulls a JVM-backed engine). Kept out of `test`.
spark = ["pyspark>=3.5", "delta-spark>=3.2"]
# Official dbt adapter conformance suite (dbt-labs/dbt-adapters). Subclassed in
# tests/conformance/ to run the standard adapter tests against duckrun.
conformance = ["pytest>=7", "pyarrow", "dbt-tests-adapter"]

[project.urls]
Homepage = "https://github.com/djouallah/duckrun"
Repository = "https://github.com/djouallah/duckrun"
Issues = "https://github.com/djouallah/duckrun/issues"

[tool.setuptools.packages.find]
# dbt uses PEP 420 namespace packages under dbt/adapters and dbt/include.
include = ["dbt", "dbt.*"]
namespaces = true

[tool.setuptools.package-data]
"dbt.include.duckrun" = ["dbt_project.yml", "**/*.sql", "**/*.yml"]
