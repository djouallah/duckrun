name: core tests

# duckrun's two core public surfaces, tested offline on a local-filesystem Delta warehouse (no
# secrets, no network — quick and deterministic):
#   • tests/adapter                                  — the dbt adapter internals (delta-rs write
#                                                      engine, remote discovery, table_exists guard).
#   • tests/connection_api/test_local_filesystem.py  — the duckrun.connect() API end to end
#                                                      (write modes, reader, catalog, merge/delete/update).
#   • tests/connection_api/test_sql_dml.py            — the conn.sql raw-DML supported/unsupported
#                                                      matrix (create/insert/update/delete/temp/view).
#   • tests/correctness/test_snapshot_pinning.py      — engine-level snapshot-pin correctness (Issue
#                                                      #1: merge OCC window, replaceWhere CAS, no-pin maintenance).
# Runs on EVERY push / PR, and as a release gate (workflow_call from publish.yml). Catches a broken
# connect / write / read / merge / catalog before it reaches the heavier, gated suites.
#
# Out of scope here (deliberately): the aemo dbt project (tests/integration_tests/aemo/, live OneLake)
# and the coffee stress scenario (tests/connection_api/test_coffee.py; local variant pulls CSVs over
# the network and generates a big fact, OneLake variant needs creds), both under integration.yml —
# plus tests/conformance/ (its own workflow). Those are integration/stress, not the per-change gate.

on:
  push:
    branches: ["**"]
  pull_request:
  # Callable as a release gate from publish.yml.
  workflow_call:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun + test deps (dbt-duckdb + duckdb + deltalake + pytest + pyarrow)
        run: pip install -e ".[test]"

      - name: Adapter unit tests + connection-API offline tests
        run: |
          python -m pytest \
            tests/adapter \
            tests/connection_api/test_local_filesystem.py \
            tests/connection_api/test_sql_dml.py \
            tests/correctness/test_snapshot_pinning.py \
            -q -p no:cacheprovider

      - name: Snapshot-pin dbt integration test (single-snapshot MERGE through a real dbt run)
        # Drives `dbt run` in-process against a local-fs warehouse and simulates a concurrent writer
        # to prove the read/write snapshot pin: a commit landing mid-run makes the run fail loudly
        # (no silent lost update), while the same commit landing before the run just succeeds.
        # Offline and deterministic, so it belongs on the per-change gate next to the unit tests.
        run: |
          python -m pytest \
            tests/integration_tests/snapshot_pin/test_snapshot_pin.py \
            -q -p no:cacheprovider
