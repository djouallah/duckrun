name: merge-spill

# Rigorous incremental-MERGE smoke test on a big fact table: generate a large TPCH lineitem
# (gate runs SF=10, ~60M rows) as the target Delta table, then merge several incremental batches
# back into it (mixed upsert, insert-only, update-only, idempotent), covering both UPDATE (matched)
# and INSERT (key-shifted) branches, plus an append / safeappend / overwrite of the same batch for
# comparison — the cheap streaming write paths next to the MERGE. No artificial
# memory cgroup — the question is whether duckrun completes on the runner's real 16 GB RAM with its
# shipping defaults on (per-merge DuckDB memory_limit + delta_rs merge spill cap + streamed_exec=
# False so the merge prunes the target via source stats instead of scanning the whole target). SF=10
# (~60M rows) is the largest fact that completes on the runner: SF=20 (~120M) builds the base fine
# but OOM-kills the runner *during the merge* (the 1% random sample touches every target file, so
# the merge rewrites ~the whole table and the delta_rs pool + DuckDB exceed 16 GB). Runs against the
# pinned deltalake 1.5.0 (1.6.0's merge is broken at scale).
#
# Expensive (~10 min) and heavy (needs the whole runner's RAM + the big disk), so it never runs on
# push/PR — a release is the main thing that should pay this cost. The publish workflow calls it
# (workflow_call) on a version tag and only publishes if it passes; the release run also renders the
# MERGE scorecard into README.md and commits it to main. It can also be run by hand
# (workflow_dispatch) with a chosen scale factor, e.g. to try a smaller/larger fact table.

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      sf:
        description: "TPCH scale factor for lineitem (release gate uses 10 ≈ 60M rows; SF=20 OOMs the merge)"
        required: false
        default: "10"

# Needed so the release run can commit the rendered scorecard back to README.md on main.
permissions:
  contents: write

# Serialize: never run two merge-spill jobs at once (each needs the whole runner's RAM and the big
# disk). Static group so concurrent release tags queue rather than race.
concurrency:
  group: merge-spill
  cancel-in-progress: false

jobs:
  merge-spill:
    runs-on: ubuntu-latest
    env:
      SF: "${{ inputs.sf || '10' }}"   # release gate uses 10; a manual dispatch can pick another
      DIR: /mnt/mbench   # the big (~66 GB) runner disk; / has only ~14 GB free
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun + tpchgen-cli
        run: |
          pip install -e ".[test]"
          pip install tpchgen-cli

      - name: Show RAM / disk / deltalake version (must be 1.5.0)
        run: |
          free -h
          df -h /mnt /
          DLV=$(python -c "import deltalake; print(deltalake.__version__)")
          echo "deltalake $DLV"
          python -c "import deltalake,sys; sys.exit(0 if deltalake.__version__.startswith('1.5.') else 1)"
          echo "DLV=$DLV" >> "$GITHUB_ENV"

      - name: Prepare big disk dir
        run: sudo mkdir -p "$DIR" && sudo chown "$(id -u):$(id -g)" "$DIR"

      - name: Generate fact + run merge scenarios
        # The bench writes the detailed, data-engineer-readable report straight to
        # $GITHUB_STEP_SUMMARY on completion (pass or assertion-fail). We only add a fallback
        # line here for the case where it dies before writing — i.e. OOM-killed (rc 137/139).
        run: |
          set -o pipefail
          python tests/tools/merge_tpch_bench.py --dir "$DIR" --sf "$SF" ; rc=$?
          if [ $rc -eq 137 ] || [ $rc -eq 139 ]; then
            {
              echo "## 🔀 Incremental MERGE test — duckrun on Delta Lake"
              echo
              echo "Mixed / insert-only / update-only merges into a SF=${SF} lineitem table on the runner's real RAM."
              echo
              echo "**Result: 💀 OOM-killed (rc=$rc)** — duckrun's defaults did not keep the merge under the runner's RAM."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $rc

      # Render the scorecard the bench just wrote (docs/merge_card.md) into docs/merge-benchmark.md
      # and commit it to main, so the MERGE card always reflects the latest release. The release runs on a tag
      # ref, so check out main explicitly and push there. [skip ci] avoids re-triggering. Never fails
      # the release on a commit hiccup. No-op if the bench died before writing the card.
      - name: Render scorecard into docs and commit to main
        # Only the release path (workflow_call -> caller's event is the tag push) commits the
        # canonical card. A manual workflow_dispatch (possibly a smaller SF) shows the card in its
        # own run summary but must NOT overwrite the release card in the docs.
        if: always() && hashFiles('docs/merge_card.md') != '' && github.event_name != 'workflow_dispatch'
        continue-on-error: true
        run: |
          git fetch origin main
          git checkout -B main origin/main
          python tests/tools/inject_readme.py docs/merge-benchmark.md docs/merge_card.md MERGE
          if git diff --quiet -- docs/merge-benchmark.md; then
            echo "docs MERGE card unchanged."
            exit 0
          fi
          git config user.name "djouallah"
          git config user.email "mimoune.djouallah@gmail.com"
          git add docs/merge-benchmark.md
          git commit -m "docs: update MERGE scorecard [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            sleep 3
          done
