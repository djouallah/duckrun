name: aemo

# The AEMO project, run REMOTELY on Microsoft Fabric compute by default: the runner ships the dbt
# logic into a throwaway Fabric Python notebook (RemoteRunner) that runs `dbt build` + `dbt test`
# there, then deletes it — that's the point of going remote (Fabric compute, co-located with the
# lakehouse, far bigger data than a 2-core runner). The runner only orchestrates + does the light
# post-steps (docs, catalog stats, the SORTED BY AUTO dogfood) reading the remotely-built OneLake
# tables. Serialize across branches (and against the parquet-layout benchmark, which reads its
# fct_summary): it writes a single shared OneLake lakehouse.
on:
  push:
    branches: ["**"]
    paths:
      - 'tests/integration_tests/aemo/**'
      - '.github/workflows/aemo.yml'
  pull_request:
    paths:
      - 'tests/integration_tests/aemo/**'
      - '.github/workflows/aemo.yml'
  workflow_dispatch:
    inputs:
      download_limit:
        description: "files to download per source (remote default 1000)"
        type: string
        default: "1000"
      process_limit:
        description: "CSV files to fold into the marts per build (default 1000)"
        type: string
        default: "1000"

permissions:
  contents: read
  id-token: write

concurrency:
  group: aemo-onelake
  cancel-in-progress: false

jobs:
  aemo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests/integration_tests/aemo
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/tests/integration_tests/aemo
      WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/7cb28f47-65bd-4aac-96c0-f7dd4eeb40ff/Tables
      FILES_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/7cb28f47-65bd-4aac-96c0-f7dd4eeb40ff/Files
      DBT_SCHEMA: mart
      # Exported to the *process* env (not just azure/login inputs) so the adapter's mid-run token
      # refresh can re-exchange a fresh GitHub OIDC assertion for a new storage token — the one source
      # that outlives the ~1h bearer token on a long backfill. See auth._github_oidc_token.
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      # The remote build runs on Fabric with RemoteRunner placing all scratch (DuckDB spill, delta_rs
      # write staging, tempfile, dbt target) on the notebook's ~135 GiB local work disk instead of the
      # cramped ~19 GiB /tmp. process_limit caps how many CSVs the fct_scada/fct_price merge folds per
      # run; the spill scales with how many monthly partitions the merge rewrites. 1000 clears the
      # whole remaining daily backlog in one run; the bound is DuckDB's ~100 GB spill cap on that disk,
      # so if this overruns it, drop back down (or raise DuckDB max_temp_directory_size toward 135 GiB).
      download_limit: ${{ inputs.download_limit || '1000' }}
      process_limit: ${{ inputs.process_limit || '1000' }}
      # Pre-flight cutoff: <= this many new pending files -> run dbt locally on the runner (no Fabric
      # spin-up); more than this -> go remote. A quick re-run has ~0 new files (local); a fresh
      # lakehouse / long gap has 100s (remote). See scripts/run_build.py.
      REMOTE_THRESHOLD: '50'
      # The azure extension's default transport fails the OneLake TLS handshake on the runner
      # ("Problem with the SSL CA cert"); the curl transport respects the system CA bundle.
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun (pulls dbt-duckdb + duckdb + deltalake)
        working-directory: ${{ github.workspace }}
        # [local] pulls azure-identity so the mid-run OIDC token refresh works — without it a build
        # longer than the token's ~1h life 401s in the tail-end dbt test phase.
        run: pip install -e ".[local]"
      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Acquire a fresh OneLake storage token (calendar pre-step + reading the run log + local post-steps)
        # Bearer tokens last ~1h, so mint one per run. OneLake takes Azure Storage AAD tokens.
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Acquire a Fabric control-plane token (create/run/delete the temp notebook)
        run: |
          TOKEN=$(az account get-access-token --resource https://api.fabric.microsoft.com --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "FABRIC_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Generate external sources (calendar Delta table — external, NOT embedded)
        # dim_calendar is an external Delta table read via source('aemo','dim_calendar'), not a model.
        run: python scripts/generate_calendar.py
      - name: dbt build + test — local for a small run, Fabric-remote (cores=32) for a big one
        # Pre-flight counts new AEMO files pending (nemweb listings minus the archive log, capped by
        # download_limit). Few pending (a quick re-run) -> run dbt LOCALLY in-process; many pending
        # (a backfill / long gap) -> ship the logic to a throwaway Fabric Python notebook at cores=32.
        # Local vs remote is just which runner run_build.py constructs. -u so the [duckrun.remote]
        # log survives interruption; the full remote dbt log is printed. Exit non-zero on any failure.
        run: python -u scripts/run_build.py
      - name: dbt docs generate (static, real catalog over abfss:// Delta tables)
        run: dbt docs generate --static --target dev
      - name: Verify the aemo catalog carries Delta table stats (issue #3)
        run: python "${{ github.workspace }}/tests/tools/check_catalog_stats.py" target/catalog.json aemo
      - name: Upload aemo docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-aemo
          path: tests/integration_tests/aemo/target/static_index.html
