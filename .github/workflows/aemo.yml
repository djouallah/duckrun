name: aemo

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Allow the deploy job to publish the generated dbt docs to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize across branches: the job writes a single shared OneLake lakehouse (and there is
# one Pages deployment), so concurrent runs would race each other's Delta tables / files.
concurrency:
  group: aemo-onelake
  cancel-in-progress: false

jobs:
  onelake:
    runs-on: ubuntu-latest
    # Real Microsoft Fabric OneLake over abfss://. This exercises the production read path
    # end to end: delta_rs writes to OneLake, and DuckDB's azure extension reads/globs/COPYs
    # through an ACCESS_TOKEN secret minted from the bearer_token in storage_options. It covers
    # the bit that only breaks on a real bearer-token store: discovery globbing abfss:// for
    # read-only commands needs the secret created at connection-open (there's no profile
    # `secrets:` block for OneLake, only the bearer_token) — see the dbt test step.
    defaults:
      run:
        working-directory: integration_tests
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/integration_tests
      WAREHOUSE_PATH: abfss://duckrun@onelake.dfs.fabric.microsoft.com/dev.Lakehouse/Tables
      FILES_PATH: abfss://duckrun@onelake.dfs.fabric.microsoft.com/dev.Lakehouse/Files
      DBT_SCHEMA: mart
      download_limit: "1"
      process_limit: "1000"
      # DuckDB azure extension's default transport fails the TLS handshake to the OneLake
      # blob endpoint on the runner ("Problem with the SSL CA cert"); the curl transport
      # respects the system CA bundle. Read by the on-run-start hook in dbt_project.yml.
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun (pulls dbt-duckdb + duckdb + deltalake)
        working-directory: ${{ github.workspace }}
        run: pip install -e .

      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Acquire a fresh OneLake bearer token
        # Bearer tokens last ~1h, so mint one per run rather than storing a stale token.
        # OneLake authenticates with Azure Storage AAD tokens (resource storage.azure.com).
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://storage.azure.com/ \
            --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: dbt build (OneLake — creates Delta tables over abfss://)
        run: dbt build --target dev --exclude tag:heavy

      - name: dbt test (fresh process — read-only delta_scan registration over abfss://)
        # A standalone `dbt test` materializes nothing, so it can only pass if the adapter
        # re-registers every Delta table on disk as a delta_scan view at run start. On a real
        # OneLake target that discovery glob needs the Azure secret created at connection-open
        # (there is no profile `secrets:` block for it, only the bearer_token) — this step is
        # the regression gate for the "schema does not exist" bug on the abfss:// read path.
        run: dbt test --target dev --exclude tag:heavy

      - name: dbt docs generate (OneLake — catalog over abfss:// Delta tables)
        run: dbt docs generate --target dev

      - name: Collect the static docs site (index.html + manifest + catalog)
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dbt-docs-site"
          cp target/index.html target/manifest.json target/catalog.json \
            "$GITHUB_WORKSPACE/dbt-docs-site/"

      - name: Upload docs as a build artifact (available on every run)
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: dbt-docs-site

      - name: Package docs for Pages
        # Only the default branch publishes; PR/feature runs still get the artifact above.
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dbt-docs-site

  deploy-docs:
    # Publish the generated dbt docs to GitHub Pages (main only).
    needs: onelake
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
