name: deploy-docs

# Publish the MkDocs Material site to GitHub Pages — decoupled from the heavy
# live-OneLake integration suite. A docs-only change builds + deploys in seconds and
# REUSES the example pages (per-project dbt catalogs + demo reports) that the
# integration workflow already produced, instead of re-running it.
#
# It runs:
#   • on a docs/site change pushed to main (fast path — reuse the last good examples);
#   • after integration_tests_onelake finishes on main (so freshly-rebuilt example
#     pages get republished);
#   • after cores finishes on main (so the scorecards it commits with [skip ci] —
#     conformance / connection / snapshot-pin / TPC-H — reach the site);
#   • on demand (workflow_dispatch).
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'hooks/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_run:
    # After integration finishes (fresh example pages), or after cores / local_stress_tests finish
    # (the scorecards they commit to docs with [skip ci] — conformance / connection / snapshot-pin
    # from cores, the SF=100 TPC-H card from local_stress_tests — which would otherwise not reach the
    # site, since [skip ci] suppresses the docs-push trigger).
    workflows: ["integration_tests_onelake", "aemo", "tpc-di", "cores", "local_stress_tests", "parity"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read   # gh run download: read artifacts from the integration workflow's runs

# Serialize Pages deploys; never cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # When chained off the integration run, only publish if that run succeeded.
    if: >-
      github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build the docs site (MkDocs Material -> site/)
        run: |
          pip install mkdocs-material
          # The committed docs/taxi.html & docs/multicatalog.html are copied into site/ here as
          # fallbacks; the example DAG pages are dropped in by the next step.
          mkdocs build
      - name: Reuse the example pages from integration tests
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Which integration run to pull the example HTML from: the run that just finished
          # (workflow_run), else the most recent successful run on main.
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            RUN_ID="${{ github.event.workflow_run.id }}"
          else
            RUN_ID="$(gh run list --workflow=integration_tests_onelake.yml --branch=main \
              --status=success --limit=1 --json databaseId --jq '.[0].databaseId' || true)"
          fi
          if [ -n "${RUN_ID:-}" ]; then
            echo "Reusing example artifacts from integration run $RUN_ID"
            gh run download "$RUN_ID" --pattern 'docs-*' --dir docs-artifacts || true
          else
            echo "No successful integration run found — will fall back to the live site."
          fi
          # parity-test dbt docs (jaffle_shop + tuva), generated ON DUCKRUN in the parity workflow.
          # jaffle_shop runs on every parity push; tuva only on workflow_dispatch — so the docs-tuva
          # artifact is in the latest dispatch run, not every run. Whatever's absent is preserved live
          # by the safety net below, so a jaffle_shop-only push never wipes the published tuva page.
          PARITY_RUN_ID="$(gh run list --workflow=parity.yml --branch=main \
            --status=success --limit=1 --json databaseId --jq '.[0].databaseId' || true)"
          if [ -n "${PARITY_RUN_ID:-}" ]; then
            echo "Reusing parity docs from run $PARITY_RUN_ID"
            gh run download "$PARITY_RUN_ID" --pattern 'docs-jaffle_shop' --dir docs-artifacts || true
            gh run download "$PARITY_RUN_ID" --pattern 'docs-tuva'        --dir docs-artifacts || true
            gh run download "$PARITY_RUN_ID" --pattern 'docs-sde'         --dir docs-artifacts || true
            gh run download "$PARITY_RUN_ID" --pattern 'docs-mrr'         --dir docs-artifacts || true
            gh run download "$PARITY_RUN_ID" --pattern 'docs-techflow'    --dir docs-artifacts || true
          fi
          # aemo docs (its own workflow now, not integration_tests_onelake) — pull from its latest run.
          AEMO_RUN_ID="$(gh run list --workflow=aemo.yml --branch=main \
            --status=success --limit=1 --json databaseId --jq '.[0].databaseId' || true)"
          if [ -n "${AEMO_RUN_ID:-}" ]; then
            echo "Reusing aemo docs from run $AEMO_RUN_ID"
            gh run download "$AEMO_RUN_ID" --pattern 'docs-aemo' --dir docs-artifacts || true
          fi
          # tpc-di docs (its own workflow, builds the warehouse on OneLake) — pull from its latest run.
          TPCDI_RUN_ID="$(gh run list --workflow=tpc_di.yml --branch=main \
            --status=success --limit=1 --json databaseId --jq '.[0].databaseId' || true)"
          if [ -n "${TPCDI_RUN_ID:-}" ]; then
            echo "Reusing tpc-di docs from run $TPCDI_RUN_ID"
            gh run download "$TPCDI_RUN_ID" --pattern 'docs-tpcdi' --dir docs-artifacts || true
          fi
          # Overlay the per-project DAG catalogs and the live demo reports onto the built site.
          cp_art() { [ -f "$1" ] && cp "$1" "site/$2" && echo "  from artifact: $2"; }
          cp_art docs-artifacts/docs-aemo/static_index.html        aemo.html            || true
          cp_art docs-artifacts/docs-coffee/static_index.html      coffee.html          || true
          cp_art docs-artifacts/docs-sde/static_index.html         sde.html             || true
          cp_art docs-artifacts/docs-mrr/static_index.html         mrr.html             || true
          cp_art docs-artifacts/docs-techflow/static_index.html    techflow.html        || true
          cp_art docs-artifacts/docs-taxi-page/taxi_run.html       taxi.html            || true
          cp_art docs-artifacts/docs-multicatalog-page/multicatalog_run.html multicatalog.html || true
          cp_art docs-artifacts/docs-multicatalog-dbt-page/multicatalog_dbt_run.html multicatalog_dbt.html || true
          cp_art docs-artifacts/docs-jaffle_shop/static_index.html jaffle_shop.html     || true
          cp_art docs-artifacts/docs-tuva/static_index.html        tuva.html            || true
          cp_art docs-artifacts/docs-tpcdi/static_index.html       tpcdi.html           || true
          # Safety net: for any example page still absent (artifact download failed and no committed
          # fallback), preserve whatever is currently published so a deploy never wipes a live page.
          for p in aemo coffee sde mrr techflow taxi multicatalog multicatalog_dbt jaffle_shop tuva tpcdi; do
            if [ ! -f "site/$p.html" ]; then
              if curl -fsS "https://djouallah.github.io/duckrun/$p.html" -o "site/$p.html"; then
                echo "  preserved live: $p.html"
              else
                echo "  WARNING: no source for $p.html (link will 404 until integration runs)"
              fi
            fi
          done
      - name: Package docs for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
