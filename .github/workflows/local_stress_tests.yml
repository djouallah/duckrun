name: local_stress_tests

# The heavy, LOCAL-filesystem stress runs, collected as one workflow. Each takes several minutes and
# the whole runner's RAM, so they NEVER run on push/PR: they are RELEASE GATES (workflow_call from
# publish.yml — a tag publishes only if they pass) and can be run by hand (workflow_dispatch) to find
# the ceiling. Each is its own job (own GitHub-hosted VM + install), and each serializes against
# other runs of ITSELF via a static concurrency group. merge-spill and tpch-stress run in parallel
# (separate VMs, separate RAM — no cross-job memory contention).
#
# Jobs:
#   • merge-spill   — generate a large TPCH lineitem (gate SF=10 ≈ 60M rows) and merge several
#                     incremental batches back into it (mixed / insert-only / update-only /
#                     idempotent), plus append / append_if_unchanged / overwrite for comparison, on the
#                     runner's real RAM with duckrun's shipping defaults. Pinned deltalake 1.5.0
#                     (1.6.0's merge is broken at scale). Renders the MERGE scorecard into docs and
#                     commits to main on the release path.
#   • tpch-stress   — the full TPC-H benchmark (ingest 8 tables → 22 queries). RELEASE GATE at a
#                     modest SF=10 (workflow_call), in PARALLEL with merge-spill (separate VMs, no
#                     shared RAM). A manual workflow_dispatch cranks it to the ceiling (default
#                     SF=100 ≈ 600M-row lineitem). ONLY that full-scale SF=100 dispatch commits the
#                     canonical docs/tpch.md scorecard — the SF=10 release gate and any smaller
#                     manual probe are pass/fail guards that must NOT clobber the published card.
#                     cores runs the SF=1 smoke.

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      sf:
        description: "merge-spill: TPCH scale factor for lineitem (gate uses 10 ≈ 60M rows; SF=20 verified in 0.3.22)"
        required: false
        default: "10"
      tpch_sf:
        description: "tpch-stress: TPCH scale factor for a MANUAL ceiling-finding run (default 100 ≈ 600M-row lineitem; the release gate ignores this and uses SF=10)"
        required: false
        default: "100"

# Needed so the release run can commit the rendered MERGE scorecard back to README on main.
permissions:
  contents: write

jobs:
  merge-spill:
    runs-on: ubuntu-latest
    # Serialize: never run two merge-spill jobs at once (each needs the whole runner's RAM and the big
    # disk). Static group so concurrent release tags queue rather than race.
    concurrency:
      group: merge-spill
      cancel-in-progress: false
    env:
      SF: "${{ inputs.sf || '10' }}"   # release gate uses 10 (SF=20 verified once in 0.3.22); a manual dispatch can pick another
      DIR: /mnt/mbench   # the big (~66 GB) runner disk; / has only ~14 GB free
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-duckrun
        with:
          extra-packages: tpchgen-cli

      - name: Show RAM / disk / deltalake version (must be 1.5.0)
        run: |
          free -h
          df -h /mnt /
          DLV=$(python -c "import deltalake; print(deltalake.__version__)")
          echo "deltalake $DLV"
          python -c "import deltalake,sys; sys.exit(0 if deltalake.__version__.startswith('1.5.') else 1)"
          echo "DLV=$DLV" >> "$GITHUB_ENV"

      - name: Prepare big disk dir
        run: sudo mkdir -p "$DIR" && sudo chown "$(id -u):$(id -g)" "$DIR"

      - name: Generate fact + run merge scenarios
        # The bench writes the detailed, data-engineer-readable report straight to
        # $GITHUB_STEP_SUMMARY on completion (pass or assertion-fail). We only add a fallback
        # line here for the case where it dies before writing — i.e. OOM-killed (rc 137/139).
        run: |
          set -o pipefail
          python tests/performance/merge_spill/merge_tpch_bench.py --dir "$DIR" --sf "$SF" ; rc=$?
          if [ $rc -eq 137 ] || [ $rc -eq 139 ]; then
            {
              echo "## 🔀 Incremental MERGE test — duckrun on Delta Lake"
              echo
              echo "Mixed / insert-only / update-only merges into a SF=${SF} lineitem table on the runner's real RAM."
              echo
              echo "**Result: 💀 OOM-killed (rc=$rc)** — duckrun's defaults did not keep the merge under the runner's RAM."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $rc

      # Render the scorecard the bench just wrote (docs/merge_card.md) into docs/merge-benchmark.md
      # and commit it to main, so the MERGE card always reflects the latest release. The release runs on a tag
      # ref, so check out main explicitly and push there. [skip ci] avoids re-triggering. Never fails
      # the release on a commit hiccup. No-op if the bench died before writing the card.
      - name: Render scorecard into docs and commit to main
        # Only the release path (workflow_call -> caller's event is the tag push) commits the
        # canonical card. A manual workflow_dispatch (possibly a smaller SF) shows the card in its
        # own run summary but must NOT overwrite the release card in the docs.
        if: always() && hashFiles('docs/merge_card.md') != '' && github.event_name != 'workflow_dispatch'
        continue-on-error: true
        uses: ./.github/actions/commit-docs
        with:
          checkout-main: 'true'   # the release runs on a tag ref; the gitignored card survives the checkout
          prepare: |
            python tests/tools/inject_readme.py docs/merge-benchmark.md docs/merge_card.md MERGE
          paths: docs/merge-benchmark.md
          message: "docs: update MERGE scorecard [skip ci]"

      - name: Append this run's result to the benchmark history
        # Unlike the canonical card above (release-only), EVERY run — release gate AND manual
        # dispatch — leaves one permanent row in docs/merge-benchmark-history.md for the trend log.
        # The bench wrote the row to docs/merge_history_row.md (gitignored); append it to the tracked
        # history against a fresh origin/main. Never fail the run on a git hiccup; [skip ci].
        if: always() && hashFiles('docs/merge_history_row.md') != ''
        continue-on-error: true
        uses: ./.github/actions/commit-docs
        with:
          checkout-main: 'true'   # the gitignored history-row file survives the checkout
          prepare: |
            cat docs/merge_history_row.md >> docs/merge-benchmark-history.md
          paths: docs/merge-benchmark-history.md
          message: "docs: record MERGE benchmark result [skip ci]"

  tpch-stress:
    # The full TPC-H benchmark (ingest the 8 tables Parquet → Delta, run the 22 queries, render the
    # docs/tpch.md scorecard). RELEASE GATE at a modest SF=10 (workflow_call, no inputs → 60M-row
    # lineitem); a manual workflow_dispatch cranks it to the ceiling (default SF=100 ≈ 600M rows).
    # Runs in PARALLEL with merge-spill — each gate job is its own GitHub-hosted VM with its own RAM,
    # so they never contend for memory. Generates onto /mnt (≈66 GB; / has only ~14 GB) via TMPDIR.
    runs-on: ubuntu-latest
    concurrency:
      group: tpch-stress
      cancel-in-progress: false
    env:
      # release gate (workflow_call, no inputs) -> SF=10; a manual dispatch picks its own (default 100).
      TPCH_SF: "${{ inputs.tpch_sf || '10' }}"
      DIR: /mnt/tpch
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-duckrun
        with:
          extra-packages: tpchgen-cli

      - name: Prepare big disk dir + show specs
        run: |
          sudo mkdir -p "$DIR" && sudo chown "$(id -u):$(id -g)" "$DIR"
          echo "## TPC-H stress — SF=$TPCH_SF" >> "$GITHUB_STEP_SUMMARY"
          echo "- CPUs: $(nproc) · memory: $(free -h | awk '/Mem:/{print $2}')" >> "$GITHUB_STEP_SUMMARY"
          free -h; df -h /mnt /

      - name: Run the TPC-H benchmark and render the scorecard
        # Generation, the Delta warehouse, and DuckDB spill all land on the big /mnt disk via TMPDIR
        # (/ has only ~14 GB). Runs from the repo root so the card writes to docs/tpch_card.md.
        # OOM / disk-full is the experiment (rc 137/139) — note it and don't crash the summary.
        env:
          TMPDIR: /mnt/tpch
        run: |
          python tests/performance/tpch/tpch_card.py ; rc=$?
          if [ $rc -eq 137 ] || [ $rc -eq 139 ]; then
            echo "**TPC-H SF=$TPCH_SF: 💀 OOM / disk-killed (rc=$rc)** — did not fit the runner." >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $rc

      - name: Render the scorecard into docs and commit to main
        # docs/tpch.md is the PUBLISHED SF=100 scorecard — only a manual, full-scale SF=100 run may
        # overwrite it. The SF=10 release gate (workflow_call) and any smaller manual dispatch (a
        # test/ceiling-probe at SF=1/10/etc.) are guard-only: they show their card in the run summary
        # but must NOT clobber the published card. Hence the explicit TPCH_SF == '100' gate — a
        # manual dispatch alone is not enough. Never fail on a commit hiccup; [skip ci]. No-op if the
        # bench died first.
        if: always() && hashFiles('docs/tpch_card.md') != '' && github.event_name == 'workflow_dispatch' && env.TPCH_SF == '100'
        continue-on-error: true
        uses: ./.github/actions/commit-docs
        with:
          checkout-main: 'true'
          prepare: |
            python tests/tools/inject_readme.py docs/tpch.md docs/tpch_card.md TPCH
          paths: docs/tpch.md
          message: "docs: update TPCH scorecard [skip ci]"

      - name: Append this run's result to the benchmark history
        # Every run — the SF=10 release gate AND a manual SF=100 dispatch — leaves one permanent row
        # in docs/tpch-benchmark-history.md for the trend log (unlike the canonical card above, which
        # only the manual run commits). The bench wrote the row to docs/tpch_history_row.md
        # (gitignored); append it to the tracked history. Never fail on a git hiccup; [skip ci].
        if: always() && hashFiles('docs/tpch_history_row.md') != ''
        continue-on-error: true
        uses: ./.github/actions/commit-docs
        with:
          checkout-main: 'true'
          prepare: |
            cat docs/tpch_history_row.md >> docs/tpch-benchmark-history.md
          paths: docs/tpch-benchmark-history.md
          message: "docs: record TPCH benchmark result [skip ci]"
