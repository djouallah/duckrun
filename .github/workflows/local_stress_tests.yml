name: local_stress_tests

# The heavy, LOCAL-filesystem stress runs, collected as one workflow. Both take ~10 min and the
# whole runner's RAM, so they NEVER run on push/PR: they are RELEASE GATES (workflow_call from
# publish.yml — a tag publishes only if they pass) and can be run by hand (workflow_dispatch) to find
# the ceiling. Each is its own job (own runner + install), and each serializes via a static group.
#
# Jobs:
#   • merge-spill   — generate a large TPCH lineitem (gate SF=10 ≈ 60M rows) and merge several
#                     incremental batches back into it (mixed / insert-only / update-only /
#                     idempotent), plus append / append_if_unchanged / overwrite for comparison, on the
#                     runner's real RAM with duckrun's shipping defaults. Pinned deltalake 1.5.0
#                     (1.6.0's merge is broken at scale). Renders the MERGE scorecard into docs and
#                     commits to main on the release path.
#   • tpch-stress   — the full TPC-H benchmark (ingest 8 tables → 22 queries) at a LARGE scale
#                     factor (default SF=100). MANUAL ONLY (workflow_dispatch) — it is a
#                     ceiling-finding run that may not fit the runner, so it never gates a release.
#                     It renders + commits the canonical docs/tpch.md scorecard (cores runs SF=1).

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      sf:
        description: "merge-spill: TPCH scale factor for lineitem (gate uses 10 ≈ 60M rows; SF=20 verified in 0.3.22)"
        required: false
        default: "10"
      tpch_sf:
        description: "tpch-stress: TPCH scale factor (manual only; SF=100 ≈ 600M-row lineitem — ceiling-finding)"
        required: false
        default: "100"

# Needed so the release run can commit the rendered MERGE scorecard back to README on main.
permissions:
  contents: write

jobs:
  merge-spill:
    runs-on: ubuntu-latest
    # Serialize: never run two merge-spill jobs at once (each needs the whole runner's RAM and the big
    # disk). Static group so concurrent release tags queue rather than race.
    concurrency:
      group: merge-spill
      cancel-in-progress: false
    env:
      SF: "${{ inputs.sf || '10' }}"   # release gate uses 10 (SF=20 verified once in 0.3.22); a manual dispatch can pick another
      DIR: /mnt/mbench   # the big (~66 GB) runner disk; / has only ~14 GB free
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun + tpchgen-cli
        run: |
          pip install -e ".[test]"
          pip install tpchgen-cli

      - name: Show RAM / disk / deltalake version (must be 1.5.0)
        run: |
          free -h
          df -h /mnt /
          DLV=$(python -c "import deltalake; print(deltalake.__version__)")
          echo "deltalake $DLV"
          python -c "import deltalake,sys; sys.exit(0 if deltalake.__version__.startswith('1.5.') else 1)"
          echo "DLV=$DLV" >> "$GITHUB_ENV"

      - name: Prepare big disk dir
        run: sudo mkdir -p "$DIR" && sudo chown "$(id -u):$(id -g)" "$DIR"

      - name: Generate fact + run merge scenarios
        # The bench writes the detailed, data-engineer-readable report straight to
        # $GITHUB_STEP_SUMMARY on completion (pass or assertion-fail). We only add a fallback
        # line here for the case where it dies before writing — i.e. OOM-killed (rc 137/139).
        run: |
          set -o pipefail
          python tests/performance/merge_spill/merge_tpch_bench.py --dir "$DIR" --sf "$SF" ; rc=$?
          if [ $rc -eq 137 ] || [ $rc -eq 139 ]; then
            {
              echo "## 🔀 Incremental MERGE test — duckrun on Delta Lake"
              echo
              echo "Mixed / insert-only / update-only merges into a SF=${SF} lineitem table on the runner's real RAM."
              echo
              echo "**Result: 💀 OOM-killed (rc=$rc)** — duckrun's defaults did not keep the merge under the runner's RAM."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $rc

      # Render the scorecard the bench just wrote (docs/merge_card.md) into docs/merge-benchmark.md
      # and commit it to main, so the MERGE card always reflects the latest release. The release runs on a tag
      # ref, so check out main explicitly and push there. [skip ci] avoids re-triggering. Never fails
      # the release on a commit hiccup. No-op if the bench died before writing the card.
      - name: Render scorecard into docs and commit to main
        # Only the release path (workflow_call -> caller's event is the tag push) commits the
        # canonical card. A manual workflow_dispatch (possibly a smaller SF) shows the card in its
        # own run summary but must NOT overwrite the release card in the docs.
        if: always() && hashFiles('docs/merge_card.md') != '' && github.event_name != 'workflow_dispatch'
        continue-on-error: true
        run: |
          git fetch origin main
          git checkout -B main origin/main
          python tests/tools/inject_readme.py docs/merge-benchmark.md docs/merge_card.md MERGE
          if git diff --quiet -- docs/merge-benchmark.md; then
            echo "docs MERGE card unchanged."
            exit 0
          fi
          git config user.name "djouallah"
          git config user.email "mimoune.djouallah@gmail.com"
          git add docs/merge-benchmark.md
          git commit -m "docs: update MERGE scorecard [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            sleep 3
          done

  tpch-stress:
    # The full TPC-H benchmark at a LARGE scale factor (default SF=100 ≈ 600M-row lineitem): ingest
    # the 8 tables Parquet → Delta, then run the 22 queries, and render the docs/tpch.md scorecard.
    # MANUAL ONLY (workflow_dispatch): SF=100 needs the big /mnt disk and may not fit, so it must
    # never gate a release (local_stress is a release gate via workflow_call). Generates onto /mnt
    # (≈66 GB; / has only ~14 GB) via TMPDIR. This is the canonical card source; cores runs SF=1.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: tpch-stress
      cancel-in-progress: false
    env:
      TPCH_SF: "${{ inputs.tpch_sf || '100' }}"
      DIR: /mnt/tpch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun + tpchgen-cli
        run: |
          pip install -e ".[test]"
          pip install tpchgen-cli

      - name: Prepare big disk dir + show specs
        run: |
          sudo mkdir -p "$DIR" && sudo chown "$(id -u):$(id -g)" "$DIR"
          echo "## TPC-H stress — SF=$TPCH_SF" >> "$GITHUB_STEP_SUMMARY"
          echo "- CPUs: $(nproc) · memory: $(free -h | awk '/Mem:/{print $2}')" >> "$GITHUB_STEP_SUMMARY"
          free -h; df -h /mnt /

      - name: Run the TPC-H benchmark and render the scorecard
        # Generation, the Delta warehouse, and DuckDB spill all land on the big /mnt disk via TMPDIR
        # (/ has only ~14 GB). Runs from the repo root so the card writes to docs/tpch_card.md.
        # OOM / disk-full is the experiment (rc 137/139) — note it and don't crash the summary.
        env:
          TMPDIR: /mnt/tpch
        run: |
          python tests/performance/tpch/tpch_card.py ; rc=$?
          if [ $rc -eq 137 ] || [ $rc -eq 139 ]; then
            echo "**TPC-H SF=$TPCH_SF: 💀 OOM / disk-killed (rc=$rc)** — did not fit the runner." >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $rc

      - name: Render the scorecard into docs and commit to main
        # This manual run IS the canonical card source. Never fail the run on a commit hiccup;
        # [skip ci] avoids re-triggering. No-op if the bench died before writing the card.
        if: always() && hashFiles('docs/tpch_card.md') != ''
        continue-on-error: true
        run: |
          git fetch origin main
          git checkout -B main origin/main
          python tests/tools/inject_readme.py docs/tpch.md docs/tpch_card.md TPCH
          if git diff --quiet -- docs/tpch.md; then
            echo "docs TPCH card unchanged."
            exit 0
          fi
          git config user.name "djouallah"
          git config user.email "mimoune.djouallah@gmail.com"
          git add docs/tpch.md
          git commit -m "docs: update TPCH scorecard [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            sleep 3
          done
