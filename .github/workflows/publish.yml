name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

# Default token scope for jobs that don't override it below.
permissions:
  contents: read

# One release at a time.
concurrency:
  group: publish
  cancel-in-progress: false

# A release must pass conformance + merge-spill + aemo before publishing. Each is a reusable
# workflow run as a gate job here. conformance/merge render their scorecard into README and commit
# it to main, so those call jobs grant contents:write (a reusable workflow can only use permissions
# the caller grants). They use a static concurrency group, so a tag-time call queues behind any
# in-flight push-to-main run rather than racing it.
# aemo exercises the real Microsoft Fabric OneLake read/write path end to end; it needs the Azure
# OIDC + Pages permissions and the repo secrets (inherited). It can be flaky on transient OneLake
# infra, but a publish must not ship an adapter that can't talk to OneLake, so it gates releases.
jobs:
  conformance:
    permissions:
      contents: write
    uses: ./.github/workflows/conformance.yml

  merge-spill:
    permissions:
      contents: write
    uses: ./.github/workflows/merge.yml

  aemo:
    permissions:
      contents: read
      pages: write
      id-token: write
    secrets: inherit
    uses: ./.github/workflows/aemo.yml

  publish:
    needs: [conformance, merge-spill, aemo]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build tools
        run: pip install build
      
      - name: Build package
        run: python -m build
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
