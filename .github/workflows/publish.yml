name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

# Default token scope for jobs that don't override it below.
permissions:
  contents: read

# One release at a time.
concurrency:
  group: publish
  cancel-in-progress: false

# A release must pass the FULL set — conformance + aemo + merge-spill — before publishing, not
# just merge-spill. Each is a reusable workflow run as a gate job here. Two things to know:
#  - A reusable workflow can only use permissions the CALLER grants, so each call job grants what
#    that workflow declares (contents:write for the README-card commit; aemo's pages/id-token for
#    its Azure-OIDC + Pages). Missing a grant fails validation at startup (it bit v0.3.9's first
#    tag push). aemo also needs the Azure secrets, hence `secrets: inherit`.
#  - These run on the TAG ref, where conformance's README commit and aemo's Pages deploy are
#    already gated `if: github.ref == 'refs/heads/main'` — so on a release they only TEST, never
#    write. And because conformance/aemo use static concurrency groups, a tag-time call queues
#    behind any in-flight push-to-main run, so publish waits for them to finish.
jobs:
  conformance:
    permissions:
      contents: write
    uses: ./.github/workflows/conformance.yml

  aemo:
    permissions:
      contents: read
      pages: write
      id-token: write
    secrets: inherit
    uses: ./.github/workflows/aemo.yml

  merge-spill:
    permissions:
      contents: write
    uses: ./.github/workflows/merge.yml

  publish:
    needs: [conformance, aemo, merge-spill]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build tools
        run: pip install build
      
      - name: Build package
        run: python -m build
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
