name: coffee-stress

# How big can a standard GitHub-hosted runner sustain for the duckrun connection API?
# Runs tests/connection_api/coffeeshop/test_coffee.py::test_coffee_local — the full scenario
# (ingest dims, generate an N-row fact, partitioned Delta write, mart, append, merge, insert-only)
# against a LOCAL filesystem warehouse (no OneLake, no network bottleneck), with N as an input.
# Manual only: you dial in the row count and read the timing + peak memory off the run summary.

on:
  workflow_dispatch:
    inputs:
      rows:
        description: "Fact rows to generate (COFFEE_LOCAL_ROWS)"
        required: true
        default: "20000000"

concurrency:
  group: coffee-stress
  cancel-in-progress: true

jobs:
  stress:
    runs-on: ubuntu-latest
    env:
      COFFEE_LOCAL_ROWS: ${{ inputs.rows }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun + pytest (dbt-duckdb + duckdb + deltalake come with it)
        run: pip install -e ".[test]"

      - name: Runner specs (the box we're stressing)
        run: |
          echo "## Runner specs" >> "$GITHUB_STEP_SUMMARY"
          echo "- rows requested: **$COFFEE_LOCAL_ROWS**" >> "$GITHUB_STEP_SUMMARY"
          echo "- CPUs: $(nproc)" >> "$GITHUB_STEP_SUMMARY"
          echo "- memory: $(free -h | awk '/Mem:/{print $2}')" >> "$GITHUB_STEP_SUMMARY"
          echo "- free disk: $(df -h / | awk 'NR==2{print $4}')" >> "$GITHUB_STEP_SUMMARY"

      - name: Run the local coffee-shop scenario at N rows (timed, with peak memory)
        run: |
          # Don't let a failed run (e.g. OOM at huge N — the experiment) abort before we
          # write the summary. PIPESTATUS[0] is pytest/time's exit, not tee's.
          set +e
          # GNU time gives Maximum resident set size; tee keeps the log for the summary.
          /usr/bin/time -v python -m pytest \
            tests/connection_api/coffeeshop/test_coffee.py::test_coffee_local \
            -q -p no:cacheprovider 2>&1 | tee stress.log
          rc=${PIPESTATUS[0]}
          {
            echo "## Result"
            peak_kb=$(grep -i "Maximum resident set size" stress.log | grep -oE '[0-9]+' | tail -1)
            wall=$(grep -iE "Elapsed \(wall clock\)" stress.log | sed 's/.*: //')
            echo "- exit code: $rc"
            echo "- wall clock: ${wall:-n/a}"
            [ -n "$peak_kb" ] && echo "- peak memory: $(awk "BEGIN{printf \"%.2f GiB\", $peak_kb/1048576}")"
            echo ""
            echo '```'
            tail -n 5 stress.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $rc
