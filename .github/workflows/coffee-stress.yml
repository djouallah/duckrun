name: coffee-stress

# Stress the connection API (duckrun.connect) at scale: how big a coffee-shop fact can a standard
# GitHub-hosted runner sustain end to end — ingest the dims, generate an N-row fact, partitioned
# Delta write, mart, append, merge, insert-only — on a LOCAL filesystem warehouse (no OneLake, no
# network bottleneck beyond the dimension CSVs). N is an input.
#
# Like merge-spill, this is a release gate: the publish workflow calls it (workflow_call) on a version
# tag and only publishes if it passes, so a connection-API regression that only shows up at scale
# blocks the release. The gate uses a moderate N (5M); a manual workflow_dispatch can crank it (default
# 20M) to find the ceiling. It writes a data-engineer-readable report (rows / wall clock / peak memory
# / stage-by-stage narration) to the run summary.

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      rows:
        description: "fact rows to generate (COFFEE_LOCAL_ROWS); the release gate uses 5,000,000"
        required: false
        default: "20000000"

permissions:
  contents: read

# Serialize: one coffee-stress at a time (it can take the whole runner's RAM at large N). Static group
# so a tag-time gate call queues behind any in-flight dispatch rather than racing it.
concurrency:
  group: coffee-stress
  cancel-in-progress: false

jobs:
  coffee-stress:
    runs-on: ubuntu-latest
    env:
      # release gate (workflow_call, no inputs) -> 5M; a manual dispatch picks its own (default 20M).
      COFFEE_LOCAL_ROWS: "${{ inputs.rows || '5000000' }}"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun + pytest (dbt-duckdb + duckdb + deltalake come with it)
        run: pip install -e ".[test]"

      - name: Runner specs (the box we're stressing)
        run: |
          echo "## Runner specs" >> "$GITHUB_STEP_SUMMARY"
          echo "- rows requested: **$COFFEE_LOCAL_ROWS**" >> "$GITHUB_STEP_SUMMARY"
          echo "- CPUs: $(nproc)" >> "$GITHUB_STEP_SUMMARY"
          echo "- memory: $(free -h | awk '/Mem:/{print $2}')" >> "$GITHUB_STEP_SUMMARY"
          echo "- free disk: $(df -h / | awk 'NR==2{print $4}')" >> "$GITHUB_STEP_SUMMARY"

      - name: Run the local coffee-shop scenario at N rows (timed, with peak memory)
        run: |
          # Don't let a failed run (e.g. OOM at huge N — the experiment) abort before we
          # write the summary. PIPESTATUS[0] is pytest/time's exit, not tee's.
          set +e
          # GNU time gives Maximum resident set size; tee keeps the log for the summary.
          # -s: stream the scenario's stage-by-stage narration into the log (without it pytest
          # captures the prints and the run shows nothing).
          /usr/bin/time -v python -m pytest \
            tests/connection_api/test_coffee.py::test_coffee_local \
            -q -s -p no:cacheprovider 2>&1 | tee stress.log
          rc=${PIPESTATUS[0]}
          {
            echo "## Result"
            peak_kb=$(grep -i "Maximum resident set size" stress.log | grep -oE '[0-9]+' | tail -1)
            wall=$(grep -iE "Elapsed \(wall clock\)" stress.log | sed 's/.*: //')
            echo "- exit code: $rc"
            echo "- wall clock: ${wall:-n/a}"
            [ -n "$peak_kb" ] && echo "- peak memory: $(awk "BEGIN{printf \"%.2f GiB\", $peak_kb/1048576}")"
            echo ""
            echo "### Scenario log (stage by stage)"
            echo '```text'
            # The narrated stages between the scenario banners; fall back to the tail if the run
            # crashed before printing them.
            narr=$(sed -n '/=== coffee-shop scenario/,/=== scenario complete ===/p' stress.log)
            if [ -n "$narr" ]; then echo "$narr"; else tail -n 20 stress.log; fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $rc
