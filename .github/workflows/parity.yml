name: parity

# dbt-duckdb validation. Take a real, UNMODIFIED `type: duckdb` dbt project and run it on duckrun;
# confirm it builds green and — where cheap — that duckrun's Delta output matches dbt-duckdb row for
# row. dbt-duckdb is the oracle; a mismatch is a duckrun bug (fixed in duckrun, never in the project).
#
# The duckrun side materializes to live Microsoft Fabric OneLake (abfss://), exactly like the
# integration suite (integration_tests_onelake.yml): duckrun self-acquires the OneLake token from the
# OIDC identity (AZURE_CLIENT_ID/AZURE_TENANT_ID) and WAREHOUSE_PATH points at the lakehouse's Tables.
# Each project writes its own Tables/parity_<proj> subfolder so the shared lakehouse never collides,
# and takes a per-project concurrency lock. The diff reads the duckrun tables back over abfss://
# (delta_scan + the same Azure secret the adapter mints).
# Run locally without OneLake by leaving WAREHOUSE_PATH unset — run_parity.py falls back to a local
# Delta warehouse.
#
# Linux on purpose: these projects use `local: ../` packages and deep paths that dbt symlinks cleanly
# on Linux but copies (recursively, hitting MAX_PATH) on Windows. The adapter behaves the same on both
# — only the dbt-deps file plumbing differs — so CI is the right home for the heavier projects.
#
# Standalone + OPT-IN: NOT a release gate (publish.yml gates on cores + local_stress_tests), so a
# failure here never blocks a release. Adapter/macro changes do NOT fire it (they used to, making
# every adapter commit run four OneLake builds) — it auto-runs only when the parity harness itself
# changes; for an adapter change, dispatch it manually when parity coverage is actually wanted.
on:
  push:
    branches: ["**"]   # any branch, but NOT a tag push (v*) — that is publish.yml's job
    paths:
      - 'tests/parity_tests/**'
      - '.github/workflows/parity.yml'
  pull_request:
    paths:
      - 'tests/parity_tests/**'
      - '.github/workflows/parity.yml'
  workflow_dispatch:
    inputs:
      run_tuva:
        description: "Also run the heavy Tuva build (hours on OneLake) — off by default."
        type: boolean
        default: false

# id-token so duckrun can exchange a GitHub OIDC assertion for the OneLake token; contents to checkout.
permissions:
  contents: read
  id-token: write

jobs:
  jaffle_shop:
    # Fast (~30s): clone jaffle_shop, build it on dbt-duckdb (oracle) AND duckrun (→ OneLake), diff
    # every persisted table (EXCEPT ALL both ways). The full differential — the strongest parity check.
    runs-on: ubuntu-latest
    concurrency:
      group: parity-jaffle-onelake
      cancel-in-progress: false
    env:
      # duckrun materializes here (abfss:// OneLake); run_parity.py reads it back over abfss for the diff.
      # Bare Tables root + a per-project SCHEMA (like the integration suite) → Tables/parity_jaffle/<table>,
      # a real Fabric table. (A subfolder in the path instead would nest a level too deep → "Unidentified".)
      WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/6d4c75af-b240-449c-909e-e5b0c3ad241a/Tables
      DBT_SCHEMA: parity_jaffle
      # The only Azure input: the OIDC federated identity. duckrun mints the OneLake token itself
      # (auth._github_oidc_token) and picks the curl transport — no azure/login, no az token step.
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun (dbt-duckdb + duckdb + deltalake come with it)
        run: pip install -e ".[test]"
      - name: Parity — jaffle_shop, duckrun (OneLake) vs dbt-duckdb (build both, diff every table)
        run: python tests/parity_tests/jaffle_shop/run_parity.py
      - name: Generate jaffle_shop dbt docs (static — catalog with row/byte stats off the OneLake tables)
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/tests/parity_tests/jaffle_shop
        working-directory: /tmp/js
        run: dbt docs generate --static --target dev --target-path target_docs
      - name: Upload jaffle_shop dbt docs (deploy-docs publishes it as jaffle_shop.html)
        uses: actions/upload-artifact@v4
        with:
          name: docs-jaffle_shop
          path: /tmp/js/target_docs/static_index.html
          if-no-files-found: error

  sde:
    # Fast (~2 min): the Start Data Engineering project (a delete+insert incremental model, an SCD2
    # snapshot, a medallion flow, packages) on dbt-duckdb (oracle) AND duckrun (→ OneLake), then diff
    # every persisted table. The repo's own EL + dbt build run UNCHANGED; only the connection differs.
    runs-on: ubuntu-latest
    concurrency:
      group: parity-sde-onelake
      cancel-in-progress: false
    env:
      WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/6d4c75af-b240-449c-909e-e5b0c3ad241a/Tables
      DBT_SCHEMA: parity_sde
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun
        run: pip install -e ".[test]"
      - name: Parity — sde, duckrun (OneLake) vs dbt-duckdb (build both, diff every table)
        run: python tests/parity_tests/sde/run_parity.py
      - name: Generate sde dbt docs (static — catalog stats off the OneLake tables)
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/tests/parity_tests/sde
        working-directory: /tmp/sde_duckrun
        run: dbt docs generate --static --target dev --target-path target_docs
      - name: Upload sde dbt docs (deploy-docs publishes it as sde.html)
        uses: actions/upload-artifact@v4
        with:
          name: docs-sde
          path: /tmp/sde_duckrun/target_docs/static_index.html
          if-no-files-found: error

  mrr:
    # Fast (~30s): the MRR (subscription-revenue) project on dbt-duckdb (oracle) AND duckrun (→ OneLake),
    # then diff every persisted table. Seeds-only (no EL), staging/intermediate views, mart TABLES that
    # amortize invoices into monthly recurring revenue + MRR movements. First project here with native
    # dbt `unit_tests:` (3 cases) + an exposure — `dbt build` runs them on both adapters.
    runs-on: ubuntu-latest
    concurrency:
      group: parity-mrr-onelake
      cancel-in-progress: false
    env:
      WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/6d4c75af-b240-449c-909e-e5b0c3ad241a/Tables
      DBT_SCHEMA: parity_mrr
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun
        run: pip install -e ".[test]"
      - name: Parity — mrr, duckrun (OneLake) vs dbt-duckdb (build both, diff every table)
        run: python tests/parity_tests/mrr/run_parity.py
      - name: Generate mrr dbt docs (static — catalog stats off the OneLake tables)
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/tests/parity_tests/mrr
        working-directory: /tmp/mrr_duckrun
        run: dbt docs generate --static --target dev --target-path target_docs
      - name: Upload mrr dbt docs (deploy-docs publishes it as mrr.html)
        uses: actions/upload-artifact@v4
        with:
          name: docs-mrr
          path: /tmp/mrr_duckrun/target_docs/static_index.html
          if-no-files-found: error

  techflow:
    # Fast: the TechFlow Analytics SaaS project on dbt-duckdb (oracle) AND duckrun (→ OneLake), then
    # diff every persisted table. First parity project with native dbt `unit_tests:`; also exercises
    # sources read from committed parquet (external_location), an incremental model, two snapshots,
    # dbt_expectations and exposures. dbt_project_evaluator's own models are skipped from the diff (a
    # linting package hardcoded to `target.type in ['duckdb']`, so it describes the adapter, not the
    # data) — it still builds green on duckrun; everything the project actually produces is diffed.
    runs-on: ubuntu-latest
    concurrency:
      group: parity-techflow-onelake
      cancel-in-progress: false
    env:
      WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/6d4c75af-b240-449c-909e-e5b0c3ad241a/Tables
      DBT_SCHEMA: parity_techflow
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun
        run: pip install -e ".[test]"
      - name: Parity — techflow, duckrun (OneLake) vs dbt-duckdb (build both, diff every table)
        run: python tests/parity_tests/techflow/run_parity.py
      - name: Generate techflow dbt docs (static — catalog stats off the OneLake tables)
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/tests/parity_tests/techflow
        working-directory: /tmp/techflow_duckrun
        run: dbt docs generate --static --target dev --target-path target_docs
      - name: Upload techflow dbt docs (deploy-docs publishes it as techflow.html)
        uses: actions/upload-artifact@v4
        with:
          name: docs-techflow
          path: /tmp/techflow_duckrun/target_docs/static_index.html
          if-no-files-found: error

  tuva:
    # Heavy (~40 min): the full Tuva data model (every vertical, synthetic_data_size=small) built
    # UNMODIFIED on duckrun → OneLake. `dbt build` runs Tuva's own models, snapshots, data-quality and
    # tests, so green here means the DuckDB/Delta port reproduces Tuva's expected results. Opt-in only:
    # even on a manual dispatch it stays skipped unless run_tuva is ticked, because the build runs for
    # HOURS on OneLake (the token-refresh fix lets it outlive the ~1h token — verified at ~5h).
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_tuva }}
    runs-on: ubuntu-latest
    concurrency:
      group: parity-tuva-onelake
      cancel-in-progress: false
    env:
      # The duckrun connection lives OUTSIDE the cloned repo (dbt profiles always do); the Tuva repo
      # is run verbatim. httpfs + s3_region (in this profile) let the seed bootstrap read the public
      # tuva-public-resources S3 bucket anonymously; models materialize to OneLake.
      DBT_PROFILES_DIR: ${{ github.workspace }}/tests/parity_tests/tuva
      WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/6d4c75af-b240-449c-909e-e5b0c3ad241a/Tables
      DBT_SCHEMA: tuva
      # Workload-identity federation: duckrun mints the OneLake token from this identity and re-mints
      # it mid-build when this ~40-66 min run outlives the ~1h token (auth._github_oidc_token / secret.refreshed).
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      # Low-noise (only prints when the token actually nears expiry): proves the mid-build refresh fired.
      DUCKRUN_AUTH_DEBUG: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun
        run: pip install -e ".[test]"
      - name: Clone Tuva (the repo under test) — run VERBATIM
        run: git clone --depth 1 --branch v0.18.0 https://github.com/tuva-health/tuva /tmp/tv
      - name: dbt deps (local ../ package symlinks on Linux; hub + git deps resolve)
        run: dbt deps
        working-directory: /tmp/tv/integration_tests
      - name: dbt build — full Tuva on duckrun → OneLake (models + snapshots + tests, everything enabled)
        run: dbt build
        working-directory: /tmp/tv/integration_tests
      - name: Generate Tuva dbt docs (static — catalog stats off the OneLake Delta tables)
        run: dbt docs generate --static --target dev --target-path target_docs
        working-directory: /tmp/tv/integration_tests
      - name: Upload Tuva dbt docs (deploy-docs publishes it as tuva.html)
        uses: actions/upload-artifact@v4
        with:
          name: docs-tuva
          path: /tmp/tv/integration_tests/target_docs/static_index.html
          if-no-files-found: error
