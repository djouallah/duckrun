name: Direct Lake query benchmark

# MANUAL ONLY, non-gating (never called by publish.yml). ONE workflow, two independent benchmark
# jobs selected by the `benchmark` input — the two projects stay separate (tests/parquet_layout/aemo
# and tests/parquet_layout/contoso), only the CI file is unified:
#   • aemo    — validates duckrun's parquet write layout against a real Fabric V-Order layout of the
#               AEMO fact, over the XMLA endpoint: _auto_sort (duckrun-clustered) vs _vorder (Spark
#               V-Order), both reading mart.fct_summary directly. See tests/parquet_layout/aemo/README.md.
#   • contoso — the Contoso sibling: same auto_sort-vs-vorder XMLA benchmark on the Contoso Sales fact,
#               generated from scratch with SQLBI's Contoso Data Generator into a DEDICATED, schema-
#               enabled `sqlbi` lakehouse. See tests/parquet_layout/contoso/README.md.
#
# Both run on ubuntu-latest (ADOMD.NET's NetCore build is cross-platform, loads under pythonnet/coreclr).
# Pick one with the `benchmark` dropdown; the other job is skipped. Inputs are shared — `orders` is
# only read by contoso, `row_limit` by both (142M ≈ full for either fact).
on:
  workflow_dispatch:
    inputs:
      benchmark:
        description: "which benchmark to run"
        type: choice
        default: aemo
        options:
          - aemo
          - contoso
      env:
        description: "deploy_config.yml env whose workspace to query"
        type: string
        default: main
      orders:
        description: "[contoso] Contoso generator OrdersCount (scale knob; default matches the pre-built ~100M base so rebuild=false reuses it)"
        type: string
        default: "100000000"
      runs:
        description: "HOT runs per query per model (run 1/2 dropped as warm; rest averaged)"
        type: string
        default: "5"
      cold:
        description: "measure cold by dehydrating (clearValues+full) before each query"
        type: boolean
        default: true
      cold_repeats:
        description: "cold dehydrate→query cycles per cold-tier query (median + spread reported)"
        type: string
        default: "3"
      row_limit:
        description: "row cap for the shared base all layouts derive from (142M ≈ full for either fact; shrink to test small-table behaviour). Use with rebuild=true."
        type: string
        default: "142000000"
      gap_seconds:
        description: "idle seconds between the base and vorder benchmarks (>5min CU smoothing => clean gap in the capacity chart)"
        type: string
        default: "300"
      opt_sort:
        description: "duckrun sort for the auto_sort copy ('auto' recommender, or cols like 'date, time' / 'OrderDate, ProductKey')"
        type: string
        default: "auto"
      rebuild:
        description: "rebuild the auto_sort/vorder (and, for contoso, the base) tables even if they already exist (else reuse)"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  aemo:
    name: 🔍 Benchmark (AEMO)
    if: ${{ inputs.benchmark == 'aemo' }}
    # Linux (was windows-latest): faster/cheaper runners, no Windows quirks. ADOMD.NET has a
    # cross-platform .NET Core build that loads under pythonnet/coreclr on Linux.
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # duckrun self-acquires every token from this OIDC identity (storage, Fabric, Power BI) and picks
      # the curl transport itself; azure/login stays only for the `az rest` lakehouse/workspace lookups.
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install deps (duckrun from THIS tree — tests the current WriterProperties)
        run: |
          pip install pythonnet pyyaml
          pip install -e .

      - name: 🧾 Init run report
        env:
          BENCH_ENV: ${{ inputs.env }}
          BENCH_RUNS: ${{ inputs.runs }}
          BENCH_COLD: ${{ inputs.cold }}
          COLD_REPEATS: ${{ inputs.cold_repeats }}
          BENCH_ROW_LIMIT: ${{ inputs.row_limit }}
          BENCH_GAP_SECONDS: ${{ inputs.gap_seconds }}
          OPT_SORT: ${{ inputs.opt_sort }}
          FORCE_REBUILD: ${{ inputs.rebuild }}
        run: |
          echo "RUN_REPORT=$PWD/run_report.json" >> "$GITHUB_ENV"
          RUN_REPORT="$PWD/run_report.json" python tests/parquet_layout/aemo/report.py init

      - name: 🧩 Install ADOMD.NET client (.NET Core build, cross-platform)
        run: |
          set -euo pipefail
          # ADOMD.NET's NetCore build is cross-platform and loads under pythonnet/coreclr. `dotnet
          # publish` a throwaway console app that references it so the DLL AND all its dependency
          # assemblies (Microsoft.Identity.Client, IdentityModel.*, …) land in one folder that
          # xmla_compare._load_adomd can glob. (A bare nupkg would miss the transitive deps.)
          proj="$RUNNER_TEMP/adomd"
          mkdir -p "$proj" && cd "$proj"
          dotnet new console -o . --force >/dev/null
          dotnet add package Microsoft.AnalysisServices.AdomdClient.NetCore.retail.amd64 >/dev/null
          dotnet publish -c Release -o publish >/dev/null
          test -f "$proj/publish/Microsoft.AnalysisServices.AdomdClient.dll"
          echo "ADOMD_DIR=$proj/publish" >> "$GITHUB_ENV"
          echo "resolved ADOMD_DIR=$proj/publish"

      - name: 🔐 Azure federated login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: 🔑 Resolve lakehouse + workspace
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # ws id from deploy_config; lakehouse id + workspace name from the Fabric/Power BI APIs.
          # No tokens minted here — the scripts self-acquire storage/Fabric/Power BI tokens via duckrun.
          $meta = python -c "import yaml, json; c = yaml.safe_load(open('tests/parquet_layout/aemo/deploy_config.yml')); e = {**c.get('defaults', {}), **c['${{ inputs.env }}']}; print(json.dumps({'ws': e['ws'], 'lh': e['lakehouse_name']}))" | ConvertFrom-Json
          $wsId = $meta.ws
          $lhs = az rest --method get --resource "https://api.fabric.microsoft.com" --url "https://api.fabric.microsoft.com/v1/workspaces/$wsId/lakehouses" | ConvertFrom-Json
          $lhId = ($lhs.value | Where-Object { $_.displayName -eq $meta.lh }).id
          if (-not $lhId) { throw "lakehouse '$($meta.lh)' not found in workspace $wsId" }
          $grp = az rest --method get --resource "https://analysis.windows.net/powerbi/api" --url "https://api.powerbi.com/v1.0/myorg/groups?`$filter=id eq '$wsId'" | ConvertFrom-Json
          $wsName = $grp.value[0].name
          if (-not $wsName) { throw "workspace name not resolved for $wsId" }
          @(
            "WS_ID=$wsId",
            "LH_ID=$lhId",
            "WS_NAME=$wsName",
            "ONELAKE_TABLES_PATH=abfss://$wsId@onelake.dfs.fabric.microsoft.com/$lhId/Tables",
            "PBI_WORKSPACE=$wsName"
          ) | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: 🔎 Check existing tables (one duckrun connection gates the whole build phase)
        id: check
        env:
          PYTHONIOENCODING: utf-8
        run: python tests/parquet_layout/aemo/check_tables.py

      - name: ⚡ Build Spark V-Order table (Livy, reads mart.fct_summary directly)
        if: ${{ inputs.rebuild || steps.check.outputs.build_needed == 'true' }}
        env:
          PYTHONIOENCODING: utf-8
          FORCE_REBUILD: ${{ inputs.rebuild }}
          BENCH_ROW_LIMIT: ${{ inputs.row_limit }}
        run: python tests/parquet_layout/aemo/build_spark_variant.py

      - name: 🧭 Build auto_sort summary table (duckrun sorted, reads mart.fct_summary directly)
        if: ${{ inputs.rebuild || steps.check.outputs.build_needed == 'true' }}
        env:
          PYTHONIOENCODING: utf-8
          OPT_SORT: ${{ inputs.opt_sort }}
          FORCE_REBUILD: ${{ inputs.rebuild }}
          BENCH_ROW_LIMIT: ${{ inputs.row_limit }}
        run: python tests/parquet_layout/aemo/build_auto_sort.py

      - name: 🚀 Deploy benchmark semantic models (auto_sort + vorder)
        # duckrun's own workspace.deploy() repoints, creates and refreshes each model with its
        # self-acquired OIDC tokens — no Fabric CLI login.
        run: python tests/parquet_layout/aemo/deploy_vorder.py --env ${{ inputs.env }}

      - name: 📊 Table stats (duckrun) — fct_summary_auto_sort vs fct_summary_vorder
        continue-on-error: true   # nice-to-have; never block the benchmark
        env:
          PYTHONIOENCODING: utf-8
        run: python tests/parquet_layout/aemo/table_stats.py

      # No token re-mint before XMLA: xmla_compare.py self-acquires the Power BI token via duckrun,
      # which re-exchanges a fresh OIDC assertion (so a long rebuild can't hand back an expiring token).
      - name: 🔍 Benchmark both models over XMLA
        env:
          PYTHONNET_RUNTIME: coreclr
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"   # non-TTY runner block-buffers stdout; stream the per-query trace live
          BENCH_RUNS: ${{ inputs.runs }}
          BENCH_COLD: ${{ inputs.cold }}
          COLD_REPEATS: ${{ inputs.cold_repeats }}
          BENCH_GAP_SECONDS: ${{ inputs.gap_seconds }}
        run: python tests/parquet_layout/aemo/xmla_compare.py

      - name: 📝 Render report to job summary (computes + merges the analysis block)
        if: always()
        continue-on-error: true
        run: python tests/parquet_layout/aemo/render_report.py

      - name: 📑 Render specialist findings to job summary (fails on verdict-direction mismatch)
        if: always()
        env:
          PYTHONIOENCODING: utf-8
        run: python tests/parquet_layout/aemo/render_summary.py

      - name: 📎 Upload run report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: run-report
          path: run_report.json
          if-no-files-found: warn

  contoso:
    name: 🔍 Benchmark (Contoso)
    if: ${{ inputs.benchmark == 'contoso' }}
    # Linux (not windows-latest): faster/cheaper runners, no Windows quirks. ADOMD.NET has a
    # cross-platform .NET Core build that loads under pythonnet/coreclr on Linux.
    runs-on: ubuntu-latest
    # Default is the ~100M base (reused when rebuild=false; a fresh rebuild is ~2h, linear from ~86s
    # at 1M) plus the delta landing, the duckrun auto_sort re-sort, and the XMLA passes — all under
    # the 6h hosted-job cap. A smaller scale (e.g. orders=10000000) needs rebuild=true to regenerate.
    timeout-minutes: 350
    env:
      # duckrun self-acquires every token from this OIDC identity and picks the curl transport itself;
      # azure/login stays only for the `az rest` lakehouse create/resolve + workspace lookup.
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install deps (duckrun from THIS tree — tests the current WriterProperties)
        run: |
          pip install pythonnet pyyaml obstore
          pip install -e .

      - name: 🧾 Init run report
        env:
          BENCH_ENV: ${{ inputs.env }}
          BENCH_RUNS: ${{ inputs.runs }}
          BENCH_COLD: ${{ inputs.cold }}
          COLD_REPEATS: ${{ inputs.cold_repeats }}
          BENCH_ROW_LIMIT: ${{ inputs.row_limit }}
          BENCH_GAP_SECONDS: ${{ inputs.gap_seconds }}
          OPT_SORT: ${{ inputs.opt_sort }}
          FORCE_REBUILD: ${{ inputs.rebuild }}
        run: |
          echo "RUN_REPORT=$PWD/run_report.json" >> "$GITHUB_ENV"
          RUN_REPORT="$PWD/run_report.json" python tests/parquet_layout/contoso/report.py init

      - name: 🧩 Install ADOMD.NET client (.NET Core build, cross-platform)
        run: |
          set -euo pipefail
          # ADOMD.NET's NetCore build is cross-platform and loads under pythonnet/coreclr. `dotnet
          # publish` a throwaway console app that references it so the DLL AND all its dependency
          # assemblies (Microsoft.Identity.Client, IdentityModel.*, …) land in one folder that
          # xmla_compare._load_adomd can glob. (A bare nupkg would miss the transitive deps.)
          proj="$RUNNER_TEMP/adomd"
          mkdir -p "$proj" && cd "$proj"
          dotnet new console -o . --force >/dev/null
          dotnet add package Microsoft.AnalysisServices.AdomdClient.NetCore.retail.amd64 >/dev/null
          dotnet publish -c Release -o publish >/dev/null
          test -f "$proj/publish/Microsoft.AnalysisServices.AdomdClient.dll"
          echo "ADOMD_DIR=$proj/publish" >> "$GITHUB_ENV"
          echo "resolved ADOMD_DIR=$proj/publish"

      - name: 🔐 Azure federated login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: 🏗️ Create the sqlbi lakehouse (idempotent)
        env:
          PYTHONIOENCODING: utf-8
        # duckrun's own workspace API creates the schema-enabled lakehouse idempotently and
        # self-acquires the Fabric control-plane token from the OIDC identity — no az token step.
        # enableSchemas (schemas=True default): Contoso + tests tables live under schemas, which
        # Livy Spark + Direct Lake need to resolve.
        run: |
          python - <<'PY'
          import yaml, duckrun
          c = yaml.safe_load(open("tests/parquet_layout/contoso/deploy_config.yml"))
          e = {**c.get("defaults", {}), **c["${{ inputs.env }}"]}
          lh = duckrun.workspace(e["ws"]).create_lakehouse(e["lakehouse_name"], schemas=True)
          print(f"lakehouse '{e['lakehouse_name']}' ready ({lh})")
          PY

      - name: 🔑 Resolve lakehouse + workspace
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # No tokens minted here — the scripts self-acquire storage/Fabric/Power BI tokens via duckrun.
          $meta = python -c "import yaml, json; c = yaml.safe_load(open('tests/parquet_layout/contoso/deploy_config.yml')); e = {**c.get('defaults', {}), **c['${{ inputs.env }}']}; print(json.dumps({'ws': e['ws'], 'lh': e['lakehouse_name']}))" | ConvertFrom-Json
          $wsId = $meta.ws
          $lhs = az rest --method get --resource "https://api.fabric.microsoft.com" --url "https://api.fabric.microsoft.com/v1/workspaces/$wsId/lakehouses" | ConvertFrom-Json
          $lhId = ($lhs.value | Where-Object { $_.displayName -eq $meta.lh }).id
          if (-not $lhId) { throw "lakehouse '$($meta.lh)' not found in workspace $wsId" }
          $grp = az rest --method get --resource "https://analysis.windows.net/powerbi/api" --url "https://api.powerbi.com/v1.0/myorg/groups?`$filter=id eq '$wsId'" | ConvertFrom-Json
          $wsName = $grp.value[0].name
          if (-not $wsName) { throw "workspace name not resolved for $wsId" }
          @(
            "WS_ID=$wsId",
            "LH_ID=$lhId",
            "WS_NAME=$wsName",
            "ONELAKE_TABLES_PATH=abfss://$wsId@onelake.dfs.fabric.microsoft.com/$lhId/Tables",
            "PBI_WORKSPACE=$wsName"
          ) | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: 🏭 Generate Contoso base (SQLBI generator → contoso.* Delta tables)
        env:
          PYTHONIOENCODING: utf-8
          CONTOSO_ORDERS: ${{ inputs.orders }}
          FORCE_REBUILD: ${{ inputs.rebuild }}
        run: python tests/parquet_layout/contoso/build_base.py

      - name: 🔎 Check existing tables (one duckrun connection gates the build phase)
        id: check
        env:
          PYTHONIOENCODING: utf-8
        run: python tests/parquet_layout/contoso/check_tables.py

      - name: ⚡ Build Spark V-Order table (Livy, reads contoso.sales directly)
        if: ${{ inputs.rebuild || steps.check.outputs.build_needed == 'true' }}
        env:
          PYTHONIOENCODING: utf-8
          FORCE_REBUILD: ${{ inputs.rebuild }}
          BENCH_ROW_LIMIT: ${{ inputs.row_limit }}
        run: python tests/parquet_layout/contoso/build_spark_variant.py

      - name: 🧭 Build auto_sort table (duckrun sorted, reads contoso.sales directly)
        if: ${{ inputs.rebuild || steps.check.outputs.build_needed == 'true' }}
        env:
          PYTHONIOENCODING: utf-8
          OPT_SORT: ${{ inputs.opt_sort }}
          FORCE_REBUILD: ${{ inputs.rebuild }}
          BENCH_ROW_LIMIT: ${{ inputs.row_limit }}
        run: python tests/parquet_layout/contoso/build_auto_sort.py

      - name: 🚀 Deploy benchmark semantic models (auto_sort + vorder)
        # duckrun's own workspace.deploy() repoints, creates and refreshes each model with its
        # self-acquired OIDC tokens — no Fabric CLI login.
        run: python tests/parquet_layout/contoso/deploy.py --env ${{ inputs.env }}

      - name: 📊 Table stats (duckrun) — sales_auto_sort vs sales_vorder
        continue-on-error: true   # nice-to-have; never block the benchmark
        env:
          PYTHONIOENCODING: utf-8
        run: python tests/parquet_layout/contoso/table_stats.py

      # No token re-mint before XMLA: xmla_compare.py self-acquires the Power BI token via duckrun,
      # which re-exchanges a fresh OIDC assertion (so a long rebuild can't hand back an expiring token).
      - name: 🔍 Benchmark both models over XMLA
        env:
          PYTHONNET_RUNTIME: coreclr
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"   # non-TTY runner block-buffers stdout; stream the per-query trace live
          BENCH_RUNS: ${{ inputs.runs }}
          BENCH_COLD: ${{ inputs.cold }}
          COLD_REPEATS: ${{ inputs.cold_repeats }}
          BENCH_GAP_SECONDS: ${{ inputs.gap_seconds }}
        run: python tests/parquet_layout/contoso/xmla_compare.py

      - name: 📝 Render report to job summary (computes + merges the analysis block)
        if: always()
        continue-on-error: true
        run: python tests/parquet_layout/contoso/render_report.py

      - name: 📑 Render specialist findings to job summary (fails on verdict-direction mismatch)
        if: always()
        env:
          PYTHONIOENCODING: utf-8
        run: python tests/parquet_layout/contoso/render_summary.py

      - name: 📎 Upload run report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: run-report-contoso
          path: run_report.json
          if-no-files-found: warn
