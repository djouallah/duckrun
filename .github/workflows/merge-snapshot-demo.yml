name: merge-snapshot-demo

# Required check on every PR (and runnable manually) proving duckrun's incremental merge is
# correctness-safe under concurrent writes: DuckDB's source delta_scan always reads a version
# >= the version delta-rs fixed for the merge target (same with no concurrency, ahead under it,
# never before), in both streamed_exec modes. The only reachable gap makes the merge FAIL loudly
# via delta-rs OCC (CommitFailedError) -- never a silent wrong result. The job exits non-zero if
# that invariant is ever violated, so a regression that breaks it blocks the PR.
# Read the scorecard on the run's summary page. See repro/merge_snapshot_safety.py.
on:
  pull_request:
  workflow_dispatch:

jobs:
  merge-snapshot-safety:
    name: merge snapshot safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun + test deps (duckdb + deltalake + pyarrow)
        run: pip install -e ".[test]"

      - name: Demonstrate merge snapshot safety under concurrency
        # Exit 0 = safety invariant holds (expected). Exit 1 = a run behaved unexpectedly.
        run: python repro/merge_snapshot_safety.py
