name: makeopendata

# The make-open-data dbt project (ported off Postgres + PostGIS) built end-to-end on a LOCAL
# filesystem Delta warehouse on the runner — NO OneLake. A real `dbt build` of ~30 models over live
# French open data plus the project's own (untouched) conformance tests (35074 communes, the KNN
# macro, the source asserts), then `dbt docs generate --static` so the published DAG page carries the
# REAL catalog stats (row counts / sizes) off the local Delta tables. The HTML is uploaded as the
# docs-makeopendata artifact and deploy-docs publishes it as makeopendata.html.
#
# Standalone + path-filtered: it is NOT a release/integration gate (publish.yml gates only on cores +
# local_stress_tests), so a failure here never blocks anything.
on:
  push:
    paths:
      - 'tests/integration_tests/makeopendata/**'
      - 'dbt/adapters/duckrun/**'
      - 'dbt/include/duckrun/**'
      - '.github/workflows/makeopendata.yml'
  pull_request:
    paths:
      - 'tests/integration_tests/makeopendata/**'
      - 'dbt/adapters/duckrun/**'
      - 'dbt/include/duckrun/**'
      - '.github/workflows/makeopendata.yml'
  workflow_dispatch:

concurrency:
  group: makeopendata-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/tests/integration_tests/makeopendata
      WAREHOUSE_PATH: ${{ github.workspace }}/makeopendata_wh   # local Delta warehouse on the runner
      DBT_SCHEMA: prepare
    defaults:
      run:
        working-directory: tests/integration_tests/makeopendata
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun + test deps (dbt-duckdb + duckdb + deltalake come with it)
        run: pip install -e ".[test]"
        working-directory: ${{ github.workspace }}

      - name: dbt deps (dbt_utils)
        run: dbt deps

      - name: dbt build (dev) — models + the upstream conformance tests, on a local Delta warehouse
        # A non-zero exit means a model failed to build OR an upstream test failed (e.g. the commune
        # count drifted from 35074, the KNN averages diverged). The tests are vendored verbatim from
        # make-open-data; green here means the DuckDB/Delta port reproduces the Postgres/PostGIS results.
        run: dbt build

      - name: dbt docs generate (static, REAL catalog over the local Delta tables)
        # --static emits a single self-contained static_index.html; the catalog is read off the Delta
        # tables just built, so the page carries row counts / sizes (not an --empty-catalog stub).
        run: dbt docs generate --static --target dev

      - name: Verify the catalog carries Delta table stats
        run: python "${{ github.workspace }}/tests/tools/check_catalog_stats.py" target/catalog.json makeopendata

      - name: Upload makeopendata docs (the DAG page deploy-docs publishes as makeopendata.html)
        uses: actions/upload-artifact@v4
        with:
          name: docs-makeopendata
          path: tests/integration_tests/makeopendata/target/static_index.html
