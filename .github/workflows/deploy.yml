name: deploy

# A manual, end-to-end demo of the duckrun.workspace(...) deploy surface. Stage the coffee dbt project
# into a fresh lakehouse's Files, deploy a notebook that runs it ON Fabric, then deploy a Direct Lake
# semantic model over the built tables + a pipeline + a variable library, and schedule the pipeline —
# all from tests/integration_tests/deploy/deploy.py. Manual only; writes a shared workspace, so serialize.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-demo-onelake
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FABRIC_WORKSPACE: 91588e42-0f1c-4e56-bcaa-cbf015b8f312
      # The only Azure inputs: the OIDC federated identity. duckrun mints every token it needs
      # (storage, Fabric control plane, Power BI) by exchanging a fresh GitHub OIDC assertion — no
      # azure/login, no az token steps — and picks the curl HTTP transport itself. This is the test:
      # duckrun's deploy surface must stand on its own.
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun from the checkout and deploy (self-contained — tokens + transport via duckrun)
        run: pip install -e ".[local]" && cd tests/integration_tests/deploy && python deploy.py
