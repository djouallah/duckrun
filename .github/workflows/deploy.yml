name: deploy

# A manual, end-to-end demo of the duckrun.workspace(...) deploy surface. Build a real dbt project
# (coffee) into a fresh lakehouse, then deploy a Direct Lake semantic model + a notebook + a pipeline
# + a variable library over it, run the notebook, and schedule the pipeline — all from the tiny
# tests/integration_tests/deploy/deploy.py. Manual only (workflow_dispatch); writes to a shared
# workspace, so serialize runs.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-demo-onelake
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # The CI-tenant workspace the service principal can write to (same one aemo.yml targets).
      FABRIC_WORKSPACE: 1c52481c-0523-4a5a-bbde-fdc932bd77c2
      DBT_SCHEMA: dbo
      # Exported to the process env so auth's GitHub-OIDC token refresh can re-exchange a fresh
      # assertion (mirrors aemo.yml).
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      # The azure extension's default transport fails the OneLake TLS handshake on the runner; curl
      # respects the system CA bundle.
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun from the checkout ([local] adds azure-identity for OIDC token refresh)
        run: pip install -e ".[local]"
      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Acquire a OneLake storage token (dbt reads/writes Delta)
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Acquire a Fabric control-plane token (create lakehouse + deploy items)
        run: |
          TOKEN=$(az account get-access-token --resource https://api.fabric.microsoft.com --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "FABRIC_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Acquire a Power BI token (semantic-model refresh)
        run: |
          TOKEN=$(az account get-access-token --resource https://analysis.windows.net/powerbi/api --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "POWERBI_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Create the demo lakehouse and point dbt at it
        run: |
          LH=$(python -c "import os,duckrun; print(duckrun.workspace(os.environ['FABRIC_WORKSPACE']).create_lakehouse('deploy_demo'))")
          echo "WAREHOUSE_PATH=abfss://$FABRIC_WORKSPACE@onelake.dfs.fabric.microsoft.com/$LH/Tables" >> "$GITHUB_ENV"
      - name: Build the full project (coffee) into deploy_demo
        run: dbt build --project-dir tests/integration_tests/coffee --profiles-dir tests/integration_tests/coffee
      - name: Deploy everything — the simplest deploy.py ever
        working-directory: tests/integration_tests/deploy
        run: python deploy.py
