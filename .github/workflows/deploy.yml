name: deploy

# A manual, end-to-end demo of the duckrun.workspace(...) deploy surface. Stage the coffee dbt project
# into a fresh lakehouse's Files, deploy a notebook that runs it ON Fabric, then deploy a Direct Lake
# semantic model over the built tables + a pipeline + a variable library, and schedule the pipeline —
# all from tests/integration_tests/deploy/deploy.py. Manual only; writes a shared workspace, so serialize.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-demo-onelake
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FABRIC_WORKSPACE: 91588e42-0f1c-4e56-bcaa-cbf015b8f312
      # Exported to the process env so auth's GitHub-OIDC token refresh can re-exchange a fresh
      # assertion (mirrors aemo.yml).
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      # The azure extension's default transport fails the OneLake TLS handshake on the runner; curl
      # respects the system CA bundle.
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun from the checkout ([local] adds azure-identity for OIDC token refresh)
        run: pip install -e ".[local]"
      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Storage token (stage the dbt project into Files via conn.copy)
        run: |
          T=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$T"; echo "AZURE_STORAGE_TOKEN=$T" >> "$GITHUB_ENV"
      - name: Fabric control-plane token (create lakehouse + deploy + run items)
        run: |
          T=$(az account get-access-token --resource https://api.fabric.microsoft.com --query accessToken -o tsv)
          echo "::add-mask::$T"; echo "FABRIC_TOKEN=$T" >> "$GITHUB_ENV"
      - name: Power BI token (semantic-model refresh)
        run: |
          T=$(az account get-access-token --resource https://analysis.windows.net/powerbi/api --query accessToken -o tsv)
          echo "::add-mask::$T"; echo "POWERBI_TOKEN=$T" >> "$GITHUB_ENV"
      - name: Deploy everything — the simplest deploy.py ever
        working-directory: tests/integration_tests/deploy
        run: python deploy.py
