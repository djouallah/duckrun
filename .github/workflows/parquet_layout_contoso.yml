name: Direct Lake query benchmark — Contoso

# MANUAL ONLY, non-gating (never called by publish.yml). The Contoso sibling of parquet_layout.yml:
# validates duckrun's parquet write layout against a real Fabric V-Order layout of the SAME Contoso
# Sales fact, by running heavy DAX over the XMLA endpoint against two Direct Lake semantic models and
# TIMING them — contoso_auto_sort (duckrun-clustered) vs contoso_vorder (Fabric Spark V-Order). The
# base is generated from scratch with SQLBI's Contoso Data Generator (MIT) and lands in a DEDICATED
# `sqlbi` lakehouse, isolated from the AEMO `data` lakehouse. Runs on windows-latest where ADOMD.NET
# loads cleanly. See tests/parquet_layout_contoso/README.md.
on:
  workflow_dispatch:
    inputs:
      env:
        description: "deploy_config.yml env whose workspace to query"
        type: string
        default: main
      orders:
        description: "Contoso generator OrdersCount (scale knob; blank = config.json default of 1,000,000)"
        type: string
        default: "1000000"
      runs:
        description: "HOT runs per query per model (run 1/2 dropped as warm; rest averaged)"
        type: string
        default: "5"
      cold:
        description: "measure cold by dehydrating (clearValues+full) before each query"
        type: boolean
        default: true
      cold_repeats:
        description: "cold dehydrate→query cycles per cold-tier query (median + spread reported)"
        type: string
        default: "3"
      row_limit:
        description: "row cap on the shared Sales base all layouts derive from (blank = full). Use with rebuild=true."
        type: string
        default: ""
      gap_seconds:
        description: "idle seconds between the base and vorder benchmarks (>5min CU smoothing => clean gap)"
        type: string
        default: "300"
      opt_sort:
        description: "duckrun sort for the auto_sort copy ('auto' recommender, or cols like 'OrderDate, ProductKey')"
        type: string
        default: "auto"
      rebuild:
        description: "rebuild the base + auto_sort/vorder tables even if they already exist (else reuse)"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  benchmark:
    name: 🔍 Benchmark (Contoso)
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install deps (duckrun from THIS tree — tests the current WriterProperties)
        run: |
          pip install pythonnet pyyaml ms-fabric-cli
          pip install -e .

      - name: 🧾 Init run report
        shell: pwsh
        env:
          BENCH_ENV: ${{ inputs.env }}
          BENCH_RUNS: ${{ inputs.runs }}
          BENCH_COLD: ${{ inputs.cold }}
          COLD_REPEATS: ${{ inputs.cold_repeats }}
          BENCH_ROW_LIMIT: ${{ inputs.row_limit }}
          BENCH_GAP_SECONDS: ${{ inputs.gap_seconds }}
          OPT_SORT: ${{ inputs.opt_sort }}
          FORCE_REBUILD: ${{ inputs.rebuild }}
        run: |
          "RUN_REPORT=$PWD\run_report.json" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $env:RUN_REPORT = "$PWD\run_report.json"
          python tests/parquet_layout_contoso/report.py init

      - name: 🧩 Install ADOMD.NET client (NuGet)
        shell: pwsh
        run: |
          # NetCore build so it loads under pythonnet's coreclr runtime. No -Version => latest stable.
          nuget install Microsoft.AnalysisServices.AdomdClient.NetCore.retail.amd64 -OutputDirectory nuget -NonInteractive
          "ADOMD_DIR=$PWD\nuget" >> $env:GITHUB_ENV

      - name: 🔐 Azure federated login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: 🏗️ Create the sqlbi lakehouse (idempotent)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $meta = python -c "import yaml, json; c = yaml.safe_load(open('tests/parquet_layout_contoso/deploy_config.yml')); e = {**c.get('defaults', {}), **c['${{ inputs.env }}']}; print(json.dumps({'ws': e['ws'], 'lh': e['lakehouse_name']}))" | ConvertFrom-Json
          $wsId = $meta.ws
          $lhName = $meta.lh
          $lhs = az rest --method get --resource "https://api.fabric.microsoft.com" --url "https://api.fabric.microsoft.com/v1/workspaces/$wsId/lakehouses" | ConvertFrom-Json
          $existing = ($lhs.value | Where-Object { $_.displayName -eq $lhName }).id
          if ($existing) {
            Write-Host "lakehouse '$lhName' already exists ($existing) — reusing."
          } else {
            Write-Host "creating lakehouse '$lhName' in workspace $wsId ..."
            $body = @{ displayName = $lhName } | ConvertTo-Json
            az rest --method post --resource "https://api.fabric.microsoft.com" --url "https://api.fabric.microsoft.com/v1/workspaces/$wsId/lakehouses" --headers "Content-Type=application/json" --body $body | Out-Null
            Start-Sleep -Seconds 15
            Write-Host "created."
          }

      - name: 🔑 Resolve lakehouse + mint tokens
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $meta = python -c "import yaml, json; c = yaml.safe_load(open('tests/parquet_layout_contoso/deploy_config.yml')); e = {**c.get('defaults', {}), **c['${{ inputs.env }}']}; print(json.dumps({'ws': e['ws'], 'lh': e['lakehouse_name']}))" | ConvertFrom-Json
          $wsId = $meta.ws
          $lhs = az rest --method get --resource "https://api.fabric.microsoft.com" --url "https://api.fabric.microsoft.com/v1/workspaces/$wsId/lakehouses" | ConvertFrom-Json
          $lhId = ($lhs.value | Where-Object { $_.displayName -eq $meta.lh }).id
          if (-not $lhId) { throw "lakehouse '$($meta.lh)' not found in workspace $wsId" }
          $grp = az rest --method get --resource "https://analysis.windows.net/powerbi/api" --url "https://api.powerbi.com/v1.0/myorg/groups?`$filter=id eq '$wsId'" | ConvertFrom-Json
          $wsName = $grp.value[0].name
          if (-not $wsName) { throw "workspace name not resolved for $wsId" }
          # Mint ALL tokens now, while the OIDC client assertion is fresh (later steps outlive it).
          $onelake = az account get-access-token --resource "https://storage.azure.com/" --query accessToken -o tsv
          $fabric  = az account get-access-token --resource "https://api.fabric.microsoft.com" --query accessToken -o tsv
          $pbi     = az account get-access-token --resource "https://analysis.windows.net/powerbi/api" --query accessToken -o tsv
          echo "::add-mask::$onelake"; echo "::add-mask::$fabric"; echo "::add-mask::$pbi"
          @(
            "WS_ID=$wsId",
            "LH_ID=$lhId",
            "WS_NAME=$wsName",
            "ONELAKE_TABLES_PATH=abfss://$wsId@onelake.dfs.fabric.microsoft.com/$lhId/Tables",
            "ONELAKE_TOKEN=$onelake",
            "FABRIC_TOKEN=$fabric",
            "PBI_TOKEN=$pbi",
            "PBI_WORKSPACE=$wsName"
          ) | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: 🏭 Generate Contoso base (SQLBI generator → contoso.* Delta tables)
        env:
          PYTHONIOENCODING: utf-8
          CONTOSO_ORDERS: ${{ inputs.orders }}
          FORCE_REBUILD: ${{ inputs.rebuild }}
        run: python tests/parquet_layout_contoso/build_base.py

      - name: 🔎 Check existing tables (one duckrun connection gates the build phase)
        id: check
        env:
          PYTHONIOENCODING: utf-8
        run: python tests/parquet_layout_contoso/check_tables.py

      - name: ⚡ Build Spark V-Order table (Livy, reads contoso.sales directly)
        if: ${{ inputs.rebuild || steps.check.outputs.build_needed == 'true' }}
        env:
          PYTHONIOENCODING: utf-8
          FORCE_REBUILD: ${{ inputs.rebuild }}
          BENCH_ROW_LIMIT: ${{ inputs.row_limit }}
        run: python tests/parquet_layout_contoso/build_spark_variant.py

      - name: 🧭 Build auto_sort table (duckrun sorted, reads contoso.sales directly)
        if: ${{ inputs.rebuild || steps.check.outputs.build_needed == 'true' }}
        env:
          PYTHONIOENCODING: utf-8
          OPT_SORT: ${{ inputs.opt_sort }}
          FORCE_REBUILD: ${{ inputs.rebuild }}
          BENCH_ROW_LIMIT: ${{ inputs.row_limit }}
        run: python tests/parquet_layout_contoso/build_auto_sort.py

      - name: 🚀 Deploy benchmark semantic models (auto_sort + vorder)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          fab config set encryption_fallback_enabled true
          # Federated (OIDC) login for fab — deploys only tests/parquet_layout_contoso/*.SemanticModel.
          $fed = (Invoke-RestMethod -Uri "$env:ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" -Headers @{ Authorization = "bearer $env:ACTIONS_ID_TOKEN_REQUEST_TOKEN" }).value
          fab auth login -t ${{ secrets.AZURE_TENANT_ID }} -u ${{ secrets.AZURE_CLIENT_ID }} --federated-token $fed
          python tests/parquet_layout_contoso/deploy.py --env ${{ inputs.env }}

      - name: 📊 Table stats (duckrun) — sales_auto_sort vs sales_vorder
        continue-on-error: true   # nice-to-have; never block the benchmark
        env:
          PYTHONIOENCODING: utf-8
        run: python tests/parquet_layout_contoso/table_stats.py

      - name: 🔍 Benchmark both models over XMLA
        env:
          PYTHONNET_RUNTIME: coreclr
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"   # non-TTY runner block-buffers stdout; stream the per-query trace live
          BENCH_RUNS: ${{ inputs.runs }}
          BENCH_COLD: ${{ inputs.cold }}
          COLD_REPEATS: ${{ inputs.cold_repeats }}
          BENCH_GAP_SECONDS: ${{ inputs.gap_seconds }}
        run: python tests/parquet_layout_contoso/xmla_compare.py

      - name: 📝 Render report to job summary (computes + merges the analysis block)
        if: always()
        continue-on-error: true
        run: python tests/parquet_layout_contoso/render_report.py

      - name: 📑 Render specialist findings to job summary (fails on verdict-direction mismatch)
        if: always()
        env:
          PYTHONIOENCODING: utf-8
        run: python tests/parquet_layout_contoso/render_summary.py

      - name: 📎 Upload run report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: run-report-contoso
          path: run_report.json
          if-no-files-found: warn
