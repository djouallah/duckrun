name: snapshot-pin card

# Renders the "DuckDB snapshot pin — version by version" scorecard from a real `dbt run`. The
# script (tests/integration_tests/snapshot_pin/snapshot_pin_card.py) runs the SAME concurrent-writer
# race twice against an incremental MERGE model — once WITHOUT the pin (merge vs HEAD, the old
# behaviour: a silent lost update) and once WITH it (the merge refuses, nothing lost) — and walks
# the table's Delta versions so the contrast is obvious. It exits non-zero if the pin's guarantee
# ever regresses, so this also acts as a guard, not just a poster.
#
# Cheap and offline (a few tiny local-fs Delta tables, ~1 min), so it runs on push / PR. The
# scorecard is written to the run's summary page on every run; on a push to main it is also injected
# into docs/snapshot-pin.md and committed, so the rendered card in the docs always reflects HEAD.

on:
  push:
    branches: ["**"]
    paths:
      - 'tests/integration_tests/snapshot_pin/**'
      - 'dbt/**'
      - 'docs/snapshot-pin.md'
      - '.github/workflows/snapshot-pin.yml'
  pull_request:
    paths:
      - 'tests/integration_tests/snapshot_pin/**'
      - 'dbt/**'
      - 'docs/snapshot-pin.md'
      - '.github/workflows/snapshot-pin.yml'
  workflow_dispatch:

# Needed so the push-to-main run can commit the rendered card back to docs/snapshot-pin.md.
permissions:
  contents: write

concurrency:
  group: snapshot-pin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  card:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun + test deps
        run: pip install -e ".[test]"

      - name: Render the snapshot-pin scorecard (also writes the run summary)
        # Exit 0 = the demonstration holds (unpinned loses the update, pinned preserves it).
        # Exit non-zero = the pin's guarantee regressed -> the run fails.
        run: python tests/integration_tests/snapshot_pin/snapshot_pin_card.py

      - name: Inject the card into docs and commit to main
        # Only a push to main updates the canonical card in the docs; PRs/branches just show it in
        # their own run summary. Never fail the run on a commit hiccup. [skip ci] avoids re-trigger.
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && hashFiles('snapshot_pin_card.md') != ''
        continue-on-error: true
        run: |
          python tests/tools/inject_readme.py docs/snapshot-pin.md snapshot_pin_card.md SNAPSHOT-PIN
          if git diff --quiet -- docs/snapshot-pin.md; then
            echo "docs snapshot-pin card unchanged."
            exit 0
          fi
          git config user.name "djouallah"
          git config user.email "mimoune.djouallah@gmail.com"
          git add docs/snapshot-pin.md
          git commit -m "docs: update snapshot-pin scorecard [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            sleep 3
          done
