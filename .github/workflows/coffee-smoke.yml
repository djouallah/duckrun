name: coffee smoke

# A fast, automatic smoke of the connection-API coffee-shop scenario (duckrun.connect) on a LOCAL
# filesystem warehouse at a SMALL row count — the per-change guard that the end-to-end scenario still
# works. Runs whenever the connection API source or the scenario file changes. It pulls the dimension
# CSVs over https, so it needs network (which is why it lives here, not in the offline core.yml gate).
#
# The two heavier siblings are elsewhere: the millions-of-rows local STRESS run is the manual `coffee`
# job in integration.yml, and the live-OneLake variant is the `coffee-onelake` job there (gated like
# aemo). This job is just the quick "did connect/read/write/merge still work" check.

on:
  push:
    branches: ["**"]
    paths:
      - 'duckrun/**'
      - 'tests/connection_api/test_coffee.py'
      - '.github/workflows/coffee-smoke.yml'
  pull_request:
    paths:
      - 'duckrun/**'
      - 'tests/connection_api/test_coffee.py'
      - '.github/workflows/coffee-smoke.yml'

jobs:
  coffee-smoke:
    runs-on: ubuntu-latest
    env:
      COFFEE_LOCAL_ROWS: "2000"   # small + fast; the manual `coffee` job is where you crank N
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun + pytest (dbt-duckdb + duckdb + deltalake come with it)
        run: pip install -e ".[test]"

      - name: Run the local coffee-shop scenario (small N)
        # -s streams the scenario's stage-by-stage narration into the job log.
        run: python -m pytest tests/connection_api/test_coffee.py::test_coffee_local -q -s -p no:cacheprovider
