name: integration

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  local:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integration_tests
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/integration_tests
      # Local-filesystem run (no OneLake creds needed): delta_rs writes Delta tables to
      # WAREHOUSE_PATH and the staging model downloads AEMO data from the public web into
      # FILES_PATH. A dummy token just makes the adapter load the azure extension (used by
      # the on-run-start setting); it is ignored for local paths. Remote OneLake is a
      # separate, secret-backed job to add once this is green.
      ONELAKE_TOKEN: dummy
      WAREHOUSE_PATH: /tmp/duckrun_warehouse
      FILES_PATH: /tmp/duckrun_files
      DBT_SCHEMA: mart
      download_limit: "2"
      process_limit: "1000"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun + test deps (pulls dbt-duckdb + duckdb + deltalake + pytest)
        working-directory: ${{ github.workspace }}
        run: pip install -e ".[test]"

      - name: pytest (concurrency / OCC engine tests)
        working-directory: ${{ github.workspace }}
        run: pytest tests/ -v

      - name: Create local warehouse + files dirs
        run: mkdir -p /tmp/duckrun_warehouse /tmp/duckrun_files

      - name: dbt --version (adapter registered + dependency macros loaded)
        run: dbt --version

      - name: dbt build (first pass — creates Delta tables via delta_rs)
        run: dbt build --exclude tag:heavy

      - name: dbt build again (fresh process — delta_scan views rebuilt from disk expose state, exercises merge)
        run: dbt build --exclude tag:heavy

  azurite:
    runs-on: ubuntu-latest
    # Azure Storage emulator: exercises the az:// path (delta_rs object_store emulator +
    # DuckDB azure delta_scan/glob/COPY) without any real cloud creds. Azurite is started
    # via `docker run` (not a service container) so we can pass --skipApiVersionCheck, which
    # the runner's newer az CLI requires.
    defaults:
      run:
        working-directory: integration_tests
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/integration_tests
      WAREHOUSE_PATH: az://lake/Tables
      FILES_PATH: az://lake/Files
      DBT_SCHEMA: mart
      download_limit: "2"
      process_limit: "1000"
      # Azurite's public well-known dev account/key (not a secret).
      AZURITE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun (pulls dbt-duckdb + duckdb + deltalake)
        working-directory: ${{ github.workspace }}
        run: pip install -e .

      - name: Start Azurite (blob; skip API-version check for newer az CLI)
        run: |
          docker run -d --name azurite -p 10000:10000 \
            mcr.microsoft.com/azure-storage/azurite \
            azurite-blob --blobHost 0.0.0.0 --skipApiVersionCheck
          for i in $(seq 1 30); do
            curl -s -o /dev/null "http://127.0.0.1:10000/devstoreaccount1" && break || sleep 1
          done

      - name: Create Azurite blob container
        run: az storage container create --name lake --connection-string "$AZURITE_CONNECTION_STRING"

      - name: dbt build (first pass — Azurite, creates Delta tables over az://)
        run: dbt build --target azurite --exclude tag:heavy

      - name: dbt build again (second pass — Azurite, delta_scan discovery + merge)
        run: dbt build --target azurite --exclude tag:heavy
