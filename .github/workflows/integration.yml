name: integration tests

# The integration suite. Jobs:
#   • aemo           — the AEMO dbt project built against live Microsoft Fabric OneLake (abfss://),
#                      under tests/integration_tests/aemo/.
#   • coffee-onelake — the connection-API coffee-shop scenario against live OneLake at a SMALL N,
#                      at tests/connection_api/test_coffee.py. Runs automatically (gated like aemo).
#   • sde-tutorial   — the josephmachado/simple_dbt_project port under sde_dbt_tutorial/, driven
#                      through real dbt subprocesses. Offline/local-fs (no secrets); always runs on
#                      push/PR.
#
# The SAME coffee scenario on a LOCAL warehouse at a HUGE N is its own reusable workflow now
# (coffee-stress.yml) — a release gate in publish.yml, plus manual dispatch. The fast small-N local
# smoke is coffee-smoke.yml.
#
# None of these is the per-change gate (that's core.yml). aemo and coffee-onelake run automatically
# only when the aemo/merge_spill/coffee projects or this workflow change. On a manual dispatch you
# pick which scenario(s) to run. aemo is deliberately NOT a release gate (publish.yml) — it depends
# on live OneLake and is prone to transient infra failures.
#
# The aemo job also publishes the combined dbt-docs site to GitHub Pages: a landing page
# (docs/site/index.html) linking the model DAGs of every integration dbt project — aemo (full catalog
# over OneLake), merge_spill (DAG only; the 60M-row table is never built for docs, a tiny tpch parquet
# just lets it compile), coffee (DAG only; the dbt incarnation of the coffee-shop scenario) and
# sde_dbt_tutorial (DAG only; the josephmachado/simple_dbt_project port — EL builds tiny raw Delta
# tables so it can compile). It rebuilds when any of those projects, or the landing page, changes.
on:
  push:
    branches: ["**"]
    paths:
      - 'tests/integration_tests/aemo/**'
      - 'tests/integration_tests/merge_spill/**'
      - 'tests/integration_tests/coffee/**'
      - 'tests/integration_tests/sde_dbt_tutorial/**'
      - 'docs/site/**'
      - '.github/workflows/integration.yml'
  pull_request:
    paths:
      - 'tests/integration_tests/aemo/**'
      - 'tests/integration_tests/merge_spill/**'
      - 'tests/integration_tests/coffee/**'
      - 'tests/integration_tests/sde_dbt_tutorial/**'
      - 'docs/site/**'
      - '.github/workflows/integration.yml'
  workflow_dispatch:
    inputs:
      scenario:
        description: "Which scenario(s) to run (aemo and/or the small coffee-onelake check)"
        type: choice
        options: [coffee, aemo, both]
        default: coffee

# the docs deploy (in the aemo job) needs Pages + OIDC; the coffee-onelake job uses none of it.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  aemo:
    # Auto on aemo-project / workflow changes (push & PR); on manual dispatch only when selected.
    if: >-
      github.event_name == 'push' || github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && (inputs.scenario == 'aemo' || inputs.scenario == 'both'))
    runs-on: ubuntu-latest
    # Serialize across branches: the job writes a single shared OneLake lakehouse (and there is one
    # Pages deployment), so concurrent runs would race each other's Delta tables / files.
    concurrency:
      group: aemo-onelake
      cancel-in-progress: false
    # Real Microsoft Fabric OneLake over abfss://. This exercises the production read path end to
    # end: delta_rs writes to OneLake, and DuckDB's azure extension reads/globs/COPYs through an
    # ACCESS_TOKEN secret minted from the bearer_token in storage_options. It covers the bit that
    # only breaks on a real bearer-token store: discovery globbing abfss:// for read-only commands
    # needs the secret created at connection-open (there's no profile `secrets:` block for OneLake,
    # only the bearer_token) — see the dbt test step.
    defaults:
      run:
        working-directory: tests/integration_tests/aemo
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/tests/integration_tests/aemo
      WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/7cb28f47-65bd-4aac-96c0-f7dd4eeb40ff/Tables
      FILES_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/7cb28f47-65bd-4aac-96c0-f7dd4eeb40ff/Files
      DBT_SCHEMA: mart
      download_limit: "10"
      process_limit: "1000"
      # DuckDB azure extension's default transport fails the TLS handshake to the OneLake blob
      # endpoint on the runner ("Problem with the SSL CA cert"); the curl transport respects the
      # system CA bundle. Read by the on-run-start hook in dbt_project.yml.
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun (pulls dbt-duckdb + duckdb + deltalake)
        working-directory: ${{ github.workspace }}
        run: pip install -e .

      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Acquire a fresh OneLake bearer token
        # Bearer tokens last ~1h, so mint one per run rather than storing a stale token.
        # OneLake authenticates with Azure Storage AAD tokens (resource storage.azure.com).
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://storage.azure.com/ \
            --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Generate external sources (calendar Delta table)
        # dim_calendar is an external Delta table read via source('aemo','dim_calendar'),
        # not a dbt model. Build it before dbt so the source (and its tests) can resolve.
        run: python scripts/generate_calendar.py

      - name: dbt build (OneLake — creates Delta tables over abfss://)
        run: dbt build --target dev --exclude tag:heavy

      - name: dbt test (fresh process — read-only delta_scan registration over abfss://)
        # A standalone `dbt test` materializes nothing, so it can only pass if the adapter
        # re-registers every Delta table on disk as a delta_scan view at run start. On a real
        # OneLake target that discovery glob needs the Azure secret created at connection-open
        # (there is no profile `secrets:` block for it, only the bearer_token) — this step is
        # the regression gate for the "schema does not exist" bug on the abfss:// read path.
        run: dbt test --target dev --exclude tag:heavy

      - name: dbt docs generate (aemo — static, real catalog over abfss:// Delta tables)
        # --static bundles manifest + catalog into one self-contained static_index.html.
        run: dbt docs generate --static --target dev

      - name: Build the merge_spill DAG (static, empty catalog — no 60M-row build)
        # The merge_spill project's DAG, without paying for the heavy table. duckrun resolves the
        # tpch.lineitem source eagerly as a view over read_parquet, so compile needs the parquet to
        # exist — generate a tiny tpch lineitem (sf=0.01) with DuckDB's tpch extension, point the
        # source glob at it, and --empty-catalog skips the warehouse catalog query entirely. The
        # WAREHOUSE_PATH override shadows the job-level OneLake path so docs land on a throwaway dir.
        working-directory: tests/integration_tests/merge_spill
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/tests/integration_tests/merge_spill
          WAREHOUSE_PATH: /tmp/ms_docs_wh
          MERGE_SPILL_GEN: /tmp/ms_gen
        run: |
          mkdir -p /tmp/ms_docs_wh /tmp/ms_gen/lineitem
          python - <<'PY'
          import duckdb
          con = duckdb.connect()
          con.execute("INSTALL tpch; LOAD tpch; CALL dbgen(sf=0.01)")
          con.execute("COPY (SELECT * FROM lineitem) TO '/tmp/ms_gen/lineitem/part0.parquet' (FORMAT parquet)")
          PY
          dbt docs generate --static --empty-catalog --target dev

      - name: Build the coffee DAG (static, empty catalog — no build, no network beyond docs)
        # The dbt incarnation of the coffee-shop scenario. Pure compile: its models read the dim CSVs
        # via read_csv_auto (only at run time), so docs need neither the build nor a real warehouse —
        # just a throwaway WAREHOUSE_PATH shadowing the job-level OneLake path. --empty-catalog skips
        # the catalog query entirely.
        working-directory: tests/integration_tests/coffee
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/tests/integration_tests/coffee
          WAREHOUSE_PATH: /tmp/coffee_docs_wh
        run: |
          mkdir -p /tmp/coffee_docs_wh
          dbt docs generate --static --empty-catalog --target dev

      - name: Build the sde_dbt_tutorial DAG (static, real catalog — tiny full build)
        # The josephmachado/simple_dbt_project port. Unlike the other DAGs we can't --empty-catalog
        # it: order_status_pivot calls dbt_utils.get_column_values('orders_obt') at parse time, so
        # docs generate needs the gold table to actually exist. The data is tiny (~100/999/27/100
        # rows from the vendored raw_data/ CSVs), so just do a full local build into a throwaway
        # warehouse — that also yields a real catalog with column metadata. deps is required because
        # dbt_packages is gitignored (not in the checkout).
        working-directory: tests/integration_tests/sde_dbt_tutorial
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/tests/integration_tests/sde_dbt_tutorial
          DUCKRUN_WAREHOUSE: /tmp/sde_docs_wh
        run: |
          mkdir -p /tmp/sde_docs_wh
          python el/extract_load_pipeline.py
          dbt deps --target dev
          dbt seed --target dev
          dbt build --target dev
          dbt docs generate --static --target dev

      - name: Assemble the combined docs site (landing page + per-project DAGs)
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p dbt-docs-site
          cp docs/site/index.html dbt-docs-site/index.html
          cp tests/integration_tests/aemo/target/static_index.html             dbt-docs-site/aemo.html
          cp tests/integration_tests/merge_spill/target/static_index.html      dbt-docs-site/merge_spill.html
          cp tests/integration_tests/coffee/target/static_index.html           dbt-docs-site/coffee.html
          cp tests/integration_tests/sde_dbt_tutorial/target/static_index.html dbt-docs-site/sde_dbt_tutorial.html

      - name: Upload docs as a build artifact (available on every run)
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: dbt-docs-site

      - name: Package docs for Pages
        # Only the default branch publishes; PR/feature runs still get the artifact above.
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dbt-docs-site

  deploy-docs:
    # Publish the combined dbt-docs site (landing page + aemo, merge_spill & coffee DAGs) to GitHub
    # Pages (main only). Skipped automatically when the aemo job didn't run (e.g. a coffee dispatch).
    needs: aemo
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  coffee-onelake:
    # The connection-API coffee scenario (duckrun.connect) against live OneLake at a SMALL row count —
    # the network dominates, so a tiny fact is enough to exercise the abfss:// read/write path. Gated
    # exactly like the aemo job (auto on push/PR, plus a coffee/both dispatch) so live-OneLake hits
    # stay limited to project changes. Writes into an isolated schema (duckrun_conn_it) so it never
    # collides with aemo sharing the same lakehouse, and it is deliberately NOT a deploy-docs
    # dependency — a OneLake hiccup here must not block publishing the DAGs.
    if: >-
      github.event_name == 'push' || github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && (inputs.scenario == 'coffee' || inputs.scenario == 'both'))
    runs-on: ubuntu-latest
    concurrency:
      group: coffee-onelake
      cancel-in-progress: false
    env:
      WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/7cb28f47-65bd-4aac-96c0-f7dd4eeb40ff/Tables
      DUCKRUN_IT_SCHEMA: duckrun_conn_it
      COFFEE_ONELAKE_ROWS: "2000"
      # curl transport: the azure extension's default fails the OneLake TLS handshake on the runner.
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun + pytest (dbt-duckdb + duckdb + deltalake come with it)
        run: pip install -e ".[test]"

      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Acquire a fresh OneLake bearer token
        # Per-run token (they last ~1h). OneLake authenticates with Azure Storage AAD tokens.
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://storage.azure.com/ \
            --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Run the coffee-shop scenario against OneLake (small N)
        run: python -m pytest tests/connection_api/test_coffee.py::test_coffee_onelake -q -s -p no:cacheprovider

  sde-tutorial:
    # The josephmachado/simple_dbt_project port (tests/integration_tests/sde_dbt_tutorial/), driven
    # through REAL dbt subprocesses (one process per phase) against a PERSISTENT Microsoft Fabric
    # OneLake warehouse (abfss://…/Tables/sde_dbt_tutorial). The test drives a controlled source
    # change and asserts SCD2 invariants (one open version per key, contiguous validity windows,
    # idempotent rebuild) on a long-lived snapshot — the way SCD2 actually behaves in production,
    # not from a throwaway empty start. Gated like the other live-OneLake jobs (auto on push/PR);
    # a concurrency lock keeps overlapping runs from racing on the shared snapshot.
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: sde-onelake
      cancel-in-progress: false
    env:
      WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/7cb28f47-65bd-4aac-96c0-f7dd4eeb40ff/Tables
      # curl transport: the azure extension's default fails the OneLake TLS handshake on the runner.
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun + pytest (dbt-duckdb + duckdb + deltalake come with it)
        run: pip install -e ".[test]"

      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Acquire a fresh OneLake bearer token
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://storage.azure.com/ \
            --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Run the sde_dbt_tutorial SCD2 port against OneLake (stateful, real dbt subprocesses)
        run: python -m pytest tests/integration_tests/sde_dbt_tutorial/test_sde_dbt_tutorial.py -q -s -p no:cacheprovider
