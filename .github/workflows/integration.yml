name: integration

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integration_tests
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/integration_tests
      ONELAKE_TOKEN: ${{ secrets.ONELAKE_TOKEN }}     # az account get-access-token --resource https://storage.azure.com
      WAREHOUSE_PATH: ${{ secrets.WAREHOUSE_PATH }}   # abfss://<ws>@onelake.dfs.fabric.microsoft.com/<lh>.Lakehouse/Tables
      FILES_PATH: ${{ secrets.FILES_PATH }}           # abfss://<ws>@onelake.dfs.fabric.microsoft.com/<lh>.Lakehouse/Files (csv archive + log)
      DBT_SCHEMA: mart
      download_limit: "2"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun (pulls dbt-duckdb + duckdb + deltalake)
        working-directory: ${{ github.workspace }}
        run: pip install -e .

      - name: dbt --version (adapter registered + dependency macros loaded)
        run: dbt --version

      - name: dbt build (first pass — creates Delta tables via delta_rs)
        run: dbt build --exclude tag:heavy

      - name: dbt build again (fresh process — delta_scan views rebuilt from disk expose state, exercises merge)
        run: dbt build --exclude tag:heavy
