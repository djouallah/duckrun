name: integration

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Allow the deploy job to publish the generated dbt docs to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't let concurrent runs race the single Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  azurite:
    runs-on: ubuntu-latest
    # Azure Storage emulator: exercises the az:// path (delta_rs object_store emulator +
    # DuckDB azure delta_scan/glob/COPY) without any real cloud creds. This is a superset of a
    # plain local-filesystem run, so CI runs only this; the local-path case is what you verify
    # on your laptop. Azurite is started via `docker run` (not a service container) so we can
    # pass --skipApiVersionCheck, which the runner's newer az CLI requires.
    defaults:
      run:
        working-directory: integration_tests
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/integration_tests
      WAREHOUSE_PATH: az://lake/Tables
      FILES_PATH: az://lake/Files
      DBT_SCHEMA: mart
      download_limit: "2"
      process_limit: "1000"
      # Azurite's public well-known dev account/key (not a secret).
      AZURITE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun (pulls dbt-duckdb + duckdb + deltalake)
        working-directory: ${{ github.workspace }}
        run: pip install -e .

      - name: Start Azurite (blob; skip API-version check for newer az CLI)
        run: |
          docker run -d --name azurite -p 10000:10000 \
            mcr.microsoft.com/azure-storage/azurite \
            azurite-blob --blobHost 0.0.0.0 --skipApiVersionCheck
          for i in $(seq 1 30); do
            curl -s -o /dev/null "http://127.0.0.1:10000/devstoreaccount1" && break || sleep 1
          done

      - name: Create Azurite blob container
        run: az storage container create --name lake --connection-string "$AZURITE_CONNECTION_STRING"

      - name: dbt build (first pass — Azurite, creates Delta tables over az://)
        run: dbt build --target azurite --exclude tag:heavy

      - name: dbt build again (second pass — Azurite, delta_scan discovery + merge)
        run: dbt build --target azurite --exclude tag:heavy

      - name: dbt docs generate (Azurite — catalog over az:// Delta tables)
        run: dbt docs generate --target azurite

      - name: Collect the static docs site (index.html + manifest + catalog)
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dbt-docs-site"
          cp target/index.html target/manifest.json target/catalog.json \
            "$GITHUB_WORKSPACE/dbt-docs-site/"

      - name: Upload docs as a build artifact (available on every run)
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: dbt-docs-site

      - name: Package docs for Pages
        # Only the default branch publishes; PR/feature runs still get the artifact above.
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dbt-docs-site

  deploy-docs:
    # Publish the generated dbt docs to GitHub Pages (main only).
    needs: azurite
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
