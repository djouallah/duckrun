name: integration

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integration_tests
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/integration_tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun (pulls dbt-duckdb + duckdb + deltalake)
        working-directory: ${{ github.workspace }}
        run: pip install -e .

      - name: dbt --version (adapter registered + dependency macros loaded)
        run: dbt --version

      - name: dbt build (stateless, in-memory; first run overwrites Delta)
        run: dbt build

      - name: dbt build again (new process; orders_incr exercises delta merge)
        run: dbt build

      - name: Assert Delta tables exist and no DuckDB state file was created
        run: |
          test -d warehouse/main/orders_delta/_delta_log
          test -d warehouse/main/orders_incr/_delta_log
          ! ls *.duckdb 2>/dev/null
          echo "Delta tables present; no DuckDB file (stateless)."
