name: concurrency

# Delta Lake OCC demonstration tests, kept separate from the dbt integration suite.
# Both jobs prove the same point on two engines: a MERGE's conflict check is bound to
# HEAD-at-merge-start, not the version an earlier read observed (read -> concurrent DELETE
# -> MERGE commits cleanly, no error). See tests/test_concurrency*.py.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  duckrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun + test deps (deltalake + pyarrow + pytest)
        run: pip install -e ".[test]"

      - name: pytest (delta-rs OCC demonstration)
        run: pytest tests/test_concurrency.py -v

  spark:
    runs-on: ubuntu-latest
    # Heavy (JVM + delta-spark); the first run downloads the Delta jars via
    # configure_spark_with_delta_pip.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun + spark deps (pyspark + delta-spark + pytest)
        run: pip install -e ".[test,spark]"

      - name: pytest (Spark OCC demonstration)
        run: pytest tests/test_concurrency_spark.py -v
