name: integration_tests_onelake

# The integration suite: ONE job per integration dbt project, plus a final publisher.
#
# Each project job does everything for that project in a single job — build its models, run
# `dbt docs generate --static`, assert its catalog carries Delta stats (issue #3), upload its
# static_index.html, AND run that project's live-OneLake test:
#   • aemo        — built against live Microsoft Fabric OneLake (abfss://); the build itself is the
#                   OneLake exercise, and a standalone `dbt test` is the abfss:// read-path gate.
#   • merge_spill — tiny local build for the docs catalog, then the incremental-MERGE chain
#                   (merge_tpch_bench.py) over OneLake at a SMALL scale factor. The HEAVY SF=10
#                   (60M-row) memory-spill version stays a LOCAL release gate (local_stress_tests.yml).
#   • coffee      — tiny local build for the docs catalog, then the connection-API coffee scenario
#                   (duckrun.connect) over OneLake at a 100M-row fact (a heavy abfss:// write/merge).
#   • sde         — tiny local build for the docs catalog, then the SCD2 port driven through real
#                   dbt subprocesses against a persistent OneLake snapshot.
#
# `deploy-docs` is the final publisher: it collects the four projects' docs artifacts + the landing
# page (docs/site/index.html) and pushes the combined dbt-docs site to GitHub Pages (main only).
#
# None of these is the per-change gate (that's cores.yml); they hit live OneLake and so are not
# release gates. The OneLake projects share one lakehouse, so each writes an isolated schema and
# takes a per-project concurrency lock.
on:
  push:
    branches: ["**"]
    paths:
      - 'tests/integration_tests/aemo/**'
      - 'tests/integration_tests/merge_spill/**'
      - 'tests/integration_tests/coffee/**'
      - 'tests/integration_tests/sde_dbt_tutorial/**'
      - 'tests/integration_tests/taxi/**'
      - 'tests/connection_api/**'
      - 'tests/tools/merge_tpch_bench.py'
      - 'docs/site/**'
      - '.github/workflows/integration_tests_onelake.yml'
  pull_request:
    paths:
      - 'tests/integration_tests/aemo/**'
      - 'tests/integration_tests/merge_spill/**'
      - 'tests/integration_tests/coffee/**'
      - 'tests/integration_tests/sde_dbt_tutorial/**'
      - 'tests/integration_tests/taxi/**'
      - 'tests/connection_api/**'
      - 'tests/tools/merge_tpch_bench.py'
      - 'docs/site/**'
      - '.github/workflows/integration_tests_onelake.yml'
  workflow_dispatch:

# The docs deploy needs Pages + OIDC; the project jobs use OIDC (id-token) for the Azure login.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  aemo:
    # The AEMO project, built against live OneLake (abfss://) — the build IS the OneLake exercise,
    # and the standalone `dbt test` is the abfss:// read-path regression gate. Then static docs.
    # Serialize across branches: it writes a single shared OneLake lakehouse.
    runs-on: ubuntu-latest
    concurrency:
      group: aemo-onelake
      cancel-in-progress: false
    defaults:
      run:
        working-directory: tests/integration_tests/aemo
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/tests/integration_tests/aemo
      WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/7cb28f47-65bd-4aac-96c0-f7dd4eeb40ff/Tables
      FILES_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/7cb28f47-65bd-4aac-96c0-f7dd4eeb40ff/Files
      DBT_SCHEMA: mart
      download_limit: "10"
      process_limit: "1000"
      # The azure extension's default transport fails the OneLake TLS handshake on the runner
      # ("Problem with the SSL CA cert"); the curl transport respects the system CA bundle.
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun (pulls dbt-duckdb + duckdb + deltalake)
        working-directory: ${{ github.workspace }}
        run: pip install -e .
      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Acquire a fresh OneLake bearer token
        # Bearer tokens last ~1h, so mint one per run. OneLake takes Azure Storage AAD tokens.
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Generate external sources (calendar Delta table)
        # dim_calendar is an external Delta table read via source('aemo','dim_calendar'), not a model.
        run: python scripts/generate_calendar.py
      - name: dbt build (OneLake — creates Delta tables over abfss://)
        run: dbt build --target dev --exclude tag:heavy
      - name: dbt test (fresh process — read-only delta_scan registration over abfss://)
        # A standalone `dbt test` materializes nothing, so it only passes if the adapter re-registers
        # every Delta table as a delta_scan view at run start — which on OneLake needs the Azure
        # secret created at connection-open. The regression gate for "schema does not exist".
        run: dbt test --target dev --exclude tag:heavy
      - name: dbt docs generate (static, real catalog over abfss:// Delta tables)
        run: dbt docs generate --static --target dev
      - name: Verify the aemo catalog carries Delta table stats (issue #3)
        run: python "${{ github.workspace }}/tests/tools/check_catalog_stats.py" target/catalog.json aemo
      - name: Upload aemo docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-aemo
          path: tests/integration_tests/aemo/target/static_index.html

  merge_spill:
    # The incremental-MERGE project: a tiny LOCAL build for the docs catalog, then the MERGE chain
    # over OneLake at a SMALL scale factor (the abfss:// merge write/read path). The heavy SF=10
    # memory-spill version is a local release gate (merge.yml), not this.
    runs-on: ubuntu-latest
    concurrency:
      group: merge-onelake
      cancel-in-progress: false
    env:
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun + tpchgen-cli (generate_data shells out to tpchgen)
        run: |
          pip install -e ".[test]"
          pip install tpchgen-cli
      - name: dbt build + docs generate (local, tiny scale)
        working-directory: tests/integration_tests/merge_spill
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/tests/integration_tests/merge_spill
          WAREHOUSE_PATH: /tmp/ms_docs_wh
          MERGE_SPILL_GEN: /tmp/ms_gen
        run: |
          mkdir -p /tmp/ms_docs_wh /tmp/ms_gen
          dbt build --target dev
          dbt docs generate --static --target dev
      - name: Verify the merge_spill catalog carries Delta table stats (issue #3)
        working-directory: tests/integration_tests/merge_spill
        run: python "${{ github.workspace }}/tests/tools/check_catalog_stats.py" target/catalog.json merge_spill
      - name: Upload merge_spill docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-merge_spill
          path: tests/integration_tests/merge_spill/target/static_index.html
      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Acquire a fresh OneLake bearer token
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Run the MERGE chain against OneLake (small scale factor)
        # --warehouse abfss://… + --target onelake routes the whole chain to OneLake; --sf 1 keeps
        # the fact small (network-bound, not a memory test). DBT_SCHEMA isolates it from aemo.
        env:
          WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/7cb28f47-65bd-4aac-96c0-f7dd4eeb40ff/Tables
          DBT_SCHEMA: merge_spill_it
        run: >-
          python tests/tools/merge_tpch_bench.py
          --dir /tmp/merge_onelake
          --warehouse "$WAREHOUSE_PATH"
          --target onelake
          --sf 1

  coffee:
    # The coffee-shop project: a LOCAL build for the docs catalog, then the connection-API coffee
    # scenario (duckrun.connect) over OneLake at a 100M-row fact, into an isolated schema.
    runs-on: ubuntu-latest
    concurrency:
      group: coffee-onelake
      cancel-in-progress: false
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/tests/integration_tests/coffee
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun + pytest
        run: pip install -e ".[test]"
      - name: dbt build + docs generate (local)
        working-directory: tests/integration_tests/coffee
        env:
          WAREHOUSE_PATH: /tmp/coffee_docs_wh
        run: |
          mkdir -p /tmp/coffee_docs_wh
          dbt build --target dev
          dbt docs generate --static --target dev
      - name: Verify the coffee catalog carries Delta table stats (issue #3)
        working-directory: tests/integration_tests/coffee
        run: python "${{ github.workspace }}/tests/tools/check_catalog_stats.py" target/catalog.json coffee
      - name: Upload coffee docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-coffee
          path: tests/integration_tests/coffee/target/static_index.html
      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Acquire a fresh OneLake bearer token
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Run the coffee-shop scenario against OneLake (100M-row fact)
        env:
          WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/7cb28f47-65bd-4aac-96c0-f7dd4eeb40ff/Tables
          DUCKRUN_IT_SCHEMA: duckrun_conn_it
          COFFEE_ONELAKE_ROWS: "100000000"
        run: python -m pytest tests/integration_tests/coffee/test_coffee.py::test_coffee_onelake -q -s -p no:cacheprovider

      - name: Connect over a FRIENDLY-name OneLake path (delta-kernel #307 error-hygiene gate)
        # Same lakehouse as above, addressed by friendly workspace/lakehouse names instead of GUIDs.
        # OneLake's delta_scan can't read a valid table's _delta_log via friendly names — so this
        # exercises the connect() failure path live and proves the error stays clean (no leaked
        # CREATE VIEW SQL) and carries the GUID workaround. The GUID jobs above can't cover this.
        env:
          WAREHOUSE_PATH_FRIENDLY: abfss://tpch@onelake.dfs.fabric.microsoft.com/duckrun.Lakehouse/Tables
        run: python -m pytest tests/integration_tests/coffee/test_coffee.py::test_onelake_friendly_name_connect_error_is_clean -q -s -p no:cacheprovider

  taxi:
    # The SQL-first NYC-taxi showcase: a runnable demo (not a gate) that reads real live NYC TLC
    # Yellow Taxi data over https and lands it into OneLake via conn.sql(...) DML, into its own
    # schema so it never collides with the coffee tables in the shared lakehouse. Its own job so it
    # shows up as a visible node; non-fatal so a flaky live source can't redden the run.
    runs-on: ubuntu-latest
    concurrency:
      group: taxi-onelake
      cancel-in-progress: false
    env:
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun (pulls duckdb + deltalake)
        run: pip install -e .
      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Acquire a fresh OneLake bearer token
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: NYC taxi live demo (SQL-first connection-API showcase, OneLake)
        continue-on-error: true
        env:
          WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/7cb28f47-65bd-4aac-96c0-f7dd4eeb40ff/Tables
          DUCKRUN_TAXI_SCHEMA: duckrun_taxi_demo
          DUCKRUN_TAXI_PAGE: taxi_run.html   # the demo writes its full SQL+results HTML report here
        run: python tests/integration_tests/taxi/demo_taxi.py

      - name: Upload this run's HTML report for deploy-docs to publish as taxi.html
        # Named docs-* so deploy-docs picks it up with its existing `pattern: docs-*` download. The
        # report IS this run's page (no commit-back, no lag); deploy-docs copies it over taxi.html.
        if: always() && hashFiles('taxi_run.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: docs-taxi-page
          path: taxi_run.html
          if-no-files-found: warn

  sde:
    # The josephmachado/simple_dbt_project port: a tiny LOCAL full build for the docs catalog
    # (order_status_pivot needs the gold table to exist at parse time, so it can't be DAG-only),
    # then the SCD2 port driven through real dbt subprocesses against a persistent OneLake snapshot.
    runs-on: ubuntu-latest
    concurrency:
      group: sde-onelake
      cancel-in-progress: false
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/tests/integration_tests/sde_dbt_tutorial
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun + pytest
        run: pip install -e ".[test]"
      - name: EL + dbt build + docs generate (local, tiny full build)
        working-directory: tests/integration_tests/sde_dbt_tutorial
        env:
          DUCKRUN_WAREHOUSE: /tmp/sde_docs_wh
        run: |
          mkdir -p /tmp/sde_docs_wh
          python el/extract_load_pipeline.py
          dbt deps --target dev
          dbt seed --target dev
          dbt build --target dev
          dbt docs generate --static --target dev
      - name: Verify the sde_dbt_tutorial catalog carries Delta table stats (issue #3)
        working-directory: tests/integration_tests/sde_dbt_tutorial
        run: python "${{ github.workspace }}/tests/tools/check_catalog_stats.py" target/catalog.json sde_dbt_tutorial
      - name: Upload sde_dbt_tutorial docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-sde
          path: tests/integration_tests/sde_dbt_tutorial/target/static_index.html
      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Acquire a fresh OneLake bearer token
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Run the sde_dbt_tutorial SCD2 port against OneLake (stateful, real dbt subprocesses)
        env:
          WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/7cb28f47-65bd-4aac-96c0-f7dd4eeb40ff/Tables
        run: python -m pytest tests/integration_tests/sde_dbt_tutorial/test_sde_dbt_tutorial.py -q -s -p no:cacheprovider

  deploy-docs:
    # The final publisher: collect the four projects' docs artifacts + the landing page and push the
    # combined dbt-docs site to GitHub Pages (main only). `needs` all four, so any project job failing
    # (or a non-main branch) skips publishing automatically; PR/feature runs still get the four
    # per-project artifacts from their own jobs.
    needs: [aemo, merge_spill, coffee, sde, taxi]
    # Wait for taxi (so its scorecard artifact is ready) but DON'T let a flaky OneLake taxi run block
    # publishing: require only the four dbt jobs to have succeeded; taxi's result is tolerated (a
    # missing card just falls back to the placeholder).
    if: >-
      always() && github.ref == 'refs/heads/main'
      && needs.aemo.result == 'success' && needs.merge_spill.result == 'success'
      && needs.coffee.result == 'success' && needs.sde.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Download all per-project docs artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: docs-*
          path: docs-artifacts
      - name: Assemble the combined docs site (landing page + per-project DAGs)
        run: |
          mkdir -p dbt-docs-site
          cp docs/site/index.html                              dbt-docs-site/index.html
          cp docs/site/duckrun_dbt_output.png                  dbt-docs-site/duckrun_dbt_output.png
          cp docs-artifacts/docs-aemo/static_index.html        dbt-docs-site/aemo.html
          cp docs-artifacts/docs-merge_spill/static_index.html dbt-docs-site/merge_spill.html
          cp docs-artifacts/docs-coffee/static_index.html      dbt-docs-site/coffee.html
          cp docs-artifacts/docs-sde/static_index.html         dbt-docs-site/sde_dbt_tutorial.html
          # The connection-API report: ship the committed page, then overwrite it with THIS run's
          # report if the taxi job produced one — so the live taxi.html shows the run it was deployed
          # from (no commit-back, no lag). The committed copy is the fallback if the demo didn't run.
          cp docs/site/taxi.html                               dbt-docs-site/taxi.html
          if [ -f docs-artifacts/docs-taxi-page/taxi_run.html ]; then
            cp docs-artifacts/docs-taxi-page/taxi_run.html     dbt-docs-site/taxi.html
            echo "published THIS run's taxi report."
          else
            echo "no taxi report artifact — publishing the committed taxi.html."
          fi
      - name: Package docs for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dbt-docs-site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
