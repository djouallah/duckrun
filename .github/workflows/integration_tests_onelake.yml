name: integration_tests_onelake

# The integration suite: ONE job per integration dbt project, plus a final publisher.
#
# Each project job does everything for that project in a single job — build its models, run
# `dbt docs generate --static`, assert its catalog carries Delta stats (issue #3), upload its
# static_index.html, AND run that project's live-OneLake test:
#   (aemo moved to its own workflow, .github/workflows/aemo.yml.)
#   • merge_spill — the SQL-only incremental-MERGE chain (merge_tpch_bench.py, conn.sql) over OneLake
#                   at a SMALL scale factor. No docs catalog (not a dbt project). The HEAVY SF=10
#                   (60M-row) memory-spill version stays a LOCAL release gate (local_stress_tests.yml).
#   • coffee      — build the dbt models ON OneLake (like aemo) so the docs catalog reflects the
#                   live tables, then the connection-API coffee scenario.
#
# This workflow only PRODUCES the per-project docs artifacts (each project's static_index.html and
# the taxi/multicatalog demo reports); publishing to GitHub Pages is a separate workflow
# (deploy-docs.yml), which reuses these artifacts so a docs-only change never re-runs this suite.
#
# None of these is the per-change gate (that's cores.yml); they hit live OneLake and so are not
# release gates. The OneLake projects share one lakehouse, so each writes an isolated schema and
# takes a per-project concurrency lock.
on:
  push:
    branches: ["**"]
    paths:
      - 'tests/performance/merge_spill/**'
      - 'tests/integration_tests/coffee/**'
      - 'tests/integration_tests/taxi/**'
      - 'tests/integration_tests/multicatalog/**'
      - 'tests/integration_tests/onelake_breaker/**'
      - 'tests/connection_api/**'
      - '.github/workflows/integration_tests_onelake.yml'
  pull_request:
    paths:
      - 'tests/performance/merge_spill/**'
      - 'tests/integration_tests/coffee/**'
      - 'tests/integration_tests/taxi/**'
      - 'tests/integration_tests/multicatalog/**'
      - 'tests/integration_tests/onelake_breaker/**'
      - 'tests/connection_api/**'
      - '.github/workflows/integration_tests_onelake.yml'
  workflow_dispatch:
    inputs:
      project:
        description: "Which project to run ('all' runs every job)"
        type: choice
        default: all
        options:
          - all
          - merge_spill
          - coffee
          - taxi
          - multicatalog
          - breaker

# The project jobs use OIDC (id-token) for the Azure login. (Pages publishing lives in deploy-docs.yml.)
permissions:
  contents: read
  id-token: write

jobs:
  changes:
    # Per-PROJECT path filter. The workflow-level `paths` above decides whether this workflow runs at
    # all; this job decides WHICH project jobs run inside it, so a change to one project no longer
    # drags in the others (an aemo edit used to also fire merge_spill / coffee / taxi / multicatalog).
    runs-on: ubuntu-latest
    outputs:
      merge_spill: ${{ steps.filter.outputs.merge_spill }}
      coffee: ${{ steps.filter.outputs.coffee }}
      taxi: ${{ steps.filter.outputs.taxi }}
      multicatalog: ${{ steps.filter.outputs.multicatalog }}
      breaker: ${{ steps.filter.outputs.breaker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            merge_spill:
              - 'tests/performance/merge_spill/**'
              - 'tests/connection_api/**'
              - '.github/workflows/integration_tests_onelake.yml'
            coffee:
              - 'tests/integration_tests/coffee/**'
              - 'tests/connection_api/**'
              - '.github/workflows/integration_tests_onelake.yml'
            taxi:
              - 'tests/integration_tests/taxi/**'
              - 'tests/connection_api/**'
              - '.github/workflows/integration_tests_onelake.yml'
            multicatalog:
              - 'tests/integration_tests/multicatalog/**'
              - 'tests/connection_api/**'
              - '.github/workflows/integration_tests_onelake.yml'
            breaker:
              - 'tests/integration_tests/onelake_breaker/**'
              - 'tests/connection_api/**'
              - '.github/workflows/integration_tests_onelake.yml'

  merge_spill:
    # The incremental-MERGE project (SQL-only): the MERGE chain over OneLake at a SMALL scale factor
    # (the abfss:// merge write/read path via conn.sql). The heavy SF=10 memory-spill version is a
    # local release gate (local_stress_tests.yml), not this.
    needs: changes
    if: ${{ github.event_name != 'workflow_dispatch' && needs.changes.outputs.merge_spill == 'true' || (github.event_name == 'workflow_dispatch' && (inputs.project == 'merge_spill' || inputs.project == 'all')) }}
    runs-on: ubuntu-latest
    concurrency:
      group: merge-onelake
      cancel-in-progress: false
    env:
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun + tpchgen-cli (the runner shells out to tpchgen)
        run: |
          pip install -e ".[test]"
          pip install tpchgen-cli
      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Acquire a fresh OneLake bearer token
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Run the MERGE chain against OneLake (tiny scale factor)
        # --warehouse abfss://… routes the whole chain to OneLake; this job only exercises the abfss://
        # MERGE write/read path, NOT memory — the heavy SF=10 spill gate runs locally
        # (local_stress_tests.yml). So keep the fact tiny (--sf 0.1) to cut the OneLake round-trip time.
        # DBT_SCHEMA isolates it from aemo.
        env:
          WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/7cb28f47-65bd-4aac-96c0-f7dd4eeb40ff/Tables
          DBT_SCHEMA: merge_spill_it
        run: >-
          python tests/performance/merge_spill/merge_tpch_bench.py
          --dir /tmp/merge_onelake
          --warehouse "$WAREHOUSE_PATH"
          --sf 0.1

  coffee:
    # The coffee-shop project: build the dbt models DIRECTLY on OneLake (the same
    # build-on-OneLake-then-docs pattern the aemo workflow uses), so the published coffee.html DAG/catalog reflects
    # the live OneLake tables — not a throwaway local build. Then the connection-API coffee scenario
    # (duckrun.connect) over OneLake, into an isolated schema.
    needs: changes
    if: ${{ github.event_name != 'workflow_dispatch' && needs.changes.outputs.coffee == 'true' || (github.event_name == 'workflow_dispatch' && (inputs.project == 'coffee' || inputs.project == 'all')) }}
    runs-on: ubuntu-latest
    concurrency:
      group: coffee-onelake
      cancel-in-progress: false
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/tests/integration_tests/coffee
      AZURE_TRANSPORT_OPTION_TYPE: curl
      WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/7cb28f47-65bd-4aac-96c0-f7dd4eeb40ff/Tables
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun + pytest
        run: pip install -e ".[test]"
      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Acquire a fresh OneLake bearer token
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: dbt build + docs generate (OneLake — docs reflect the live tables)
        # Build the models straight onto OneLake so `dbt docs generate` collects the REAL catalog stats
        # (row counts/size) off the abfss:// Delta tables. COFFEE_ROWS sizes the fact (kept small — the
        # 100M scale is already proven); DBT_SCHEMA isolates it from the connection-API scenario's
        # schema in the shared lakehouse.
        working-directory: tests/integration_tests/coffee
        env:
          DBT_SCHEMA: duckrun_dbt_it
          COFFEE_ROWS: "10000"
        run: |
          dbt build --target dev
          dbt docs generate --static --target dev
      - name: Verify the coffee catalog carries Delta table stats (issue #3)
        working-directory: tests/integration_tests/coffee
        run: python "${{ github.workspace }}/tests/tools/check_catalog_stats.py" target/catalog.json coffee
      - name: Upload coffee docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-coffee
          path: tests/integration_tests/coffee/target/static_index.html
      - name: SORTED BY AUTO sort rewrite on fact_sales (dogfood)
        # Dogfood on the partitioned coffee fact: connect writable to the dbt build's schema, run the
        # SQL-only auto-key sort rewrite, print the before/after layout. fact_sales is partitioned by
        # region (R8) and has season<-order_date (R5), so it exercises both partition-leading order
        # and the profiler.
        env:
          DBT_SCHEMA: duckrun_dbt_it
        run: |
          python - <<'PY'
          import os, duckrun
          conn = duckrun.connect(
              os.environ["WAREHOUSE_PATH"],
              storage_options={"bearer_token": os.environ["ONELAKE_TOKEN"]},
              schema=os.environ["DBT_SCHEMA"], read_only=False)

          def detail(t):
              rel = conn.sql(f"DESCRIBE DETAIL {t}")
              return dict(zip(rel.columns, rel.fetchone()))

          before = detail("fact_sales")
          # Auto-key sort rewrite, SQL-only: profile the key from the Delta log, re-cluster in one commit.
          conn.sql("CREATE OR REPLACE TABLE fact_sales SORTED BY AUTO AS SELECT * FROM fact_sales")
          after = detail("fact_sales")
          print("=== CREATE TABLE fact_sales SORTED BY AUTO — auto-sort rewrite ===")
          print(f"numFiles: {before['numFiles']} -> {after['numFiles']}  (version {before['version']} -> {after['version']})")
          b, a = before["sizeInBytes"], after["sizeInBytes"]
          if b:
              print(f"actual on-disk size: {b/1e6:.1f} MB -> {a/1e6:.1f} MB")
          PY
      - name: Run the coffee-shop scenario against OneLake (connection-API smoke)
        env:
          DUCKRUN_IT_SCHEMA: duckrun_conn_it
          COFFEE_ONELAKE_ROWS: "2000"
        run: python -m pytest tests/integration_tests/coffee/test_coffee.py::test_coffee_onelake -q -s -p no:cacheprovider

      - name: OneLake Files copy/download round-trip (COPY … FORMAT BLOB, no obstore)
        # The live gate for conn.copy()/conn.download(): the azure COPY (FORMAT BLOB) write path can't
        # be proven off a laptop (different tenant), so it's proven here against the shared lakehouse's
        # Files scratch (never Tables).
        run: python -m pytest tests/integration_tests/coffee/test_coffee.py::test_onelake_files_copy_download_roundtrip -q -s -p no:cacheprovider

      - name: Connect over a FRIENDLY-name OneLake path (delta-kernel #307 error-hygiene gate)
        # Same lakehouse as above, addressed by friendly workspace/lakehouse names instead of GUIDs.
        # OneLake's delta_scan can't read a valid table's _delta_log via friendly names — so this
        # exercises the connect() failure path live and proves the error stays clean (no leaked
        # CREATE VIEW SQL) and carries the GUID workaround. The GUID jobs above can't cover this.
        env:
          WAREHOUSE_PATH_FRIENDLY: abfss://tpch@onelake.dfs.fabric.microsoft.com/duckrun.Lakehouse/Tables
        run: python -m pytest tests/integration_tests/coffee/test_coffee.py::test_onelake_friendly_name_connect_error_is_clean -q -s -p no:cacheprovider

  taxi:
    # The SQL-first NYC-taxi showcase: a runnable demo (not a gate) that reads real live NYC TLC
    # Yellow Taxi data over https and lands it into OneLake via conn.sql(...) DML, into its own
    # schema so it never collides with the coffee tables in the shared lakehouse. Its own job so it
    # shows up as a visible node; non-fatal so a flaky live source can't redden the run.
    needs: changes
    if: ${{ github.event_name != 'workflow_dispatch' && needs.changes.outputs.taxi == 'true' || (github.event_name == 'workflow_dispatch' && (inputs.project == 'taxi' || inputs.project == 'all')) }}
    runs-on: ubuntu-latest
    concurrency:
      group: taxi-onelake
      cancel-in-progress: false
    env:
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun (pulls duckdb + deltalake)
        run: pip install -e .
      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Acquire a fresh OneLake bearer token
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: NYC taxi live demo (SQL-first connection-API showcase, OneLake)
        env:
          WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/7cb28f47-65bd-4aac-96c0-f7dd4eeb40ff/Tables
          DUCKRUN_TAXI_SCHEMA: duckrun_taxi_demo
          DUCKRUN_TAXI_PAGE: taxi_run.html   # the demo writes its full SQL+results HTML report here
        run: python tests/integration_tests/taxi/demo_taxi.py

      - name: SORTED BY AUTO sort rewrite on trips (dogfood)
        # Dogfood of the SQL-only auto-key sort rewrite on the demo fact table: connect writable, run
        # CREATE TABLE trips SORTED BY AUTO, and print the before/after layout to the CI log.
        env:
          WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/7cb28f47-65bd-4aac-96c0-f7dd4eeb40ff/Tables
          DUCKRUN_TAXI_SCHEMA: duckrun_taxi_demo
        run: |
          python - <<'PY'
          import os, duckrun
          conn = duckrun.connect(
              os.environ["WAREHOUSE_PATH"],
              storage_options={"bearer_token": os.environ["ONELAKE_TOKEN"]},
              schema=os.environ["DUCKRUN_TAXI_SCHEMA"], read_only=False)

          def detail(t):
              rel = conn.sql(f"DESCRIBE DETAIL {t}")
              return dict(zip(rel.columns, rel.fetchone()))

          before = detail("trips")
          # Auto-key sort rewrite, SQL-only: profile the key from the Delta log, re-cluster in one commit.
          conn.sql("CREATE OR REPLACE TABLE trips SORTED BY AUTO AS SELECT * FROM trips")
          after = detail("trips")
          print("=== CREATE TABLE trips SORTED BY AUTO — auto-sort rewrite ===")
          print(f"numFiles: {before['numFiles']} -> {after['numFiles']}  (version {before['version']} -> {after['version']})")
          b, a = before["sizeInBytes"], after["sizeInBytes"]
          if b:
              print(f"actual on-disk size: {b/1e6:.1f} MB -> {a/1e6:.1f} MB")
          PY

      - name: Upload this run's HTML report for deploy-docs to publish as taxi.html
        # Named docs-* so deploy-docs picks it up with its existing `pattern: docs-*` download. The
        # report IS this run's page (no commit-back, no lag); deploy-docs copies it over taxi.html.
        if: always() && hashFiles('taxi_run.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: docs-taxi-page
          path: taxi_run.html
          if-no-files-found: warn

  multicatalog:
    # The multi-catalog connection-API showcase (a runnable demo, not a gate): one session binds the
    # writable OneLake lakehouse, a READ-ONLY Fabric Warehouse, and a local scratch dir as three
    # catalogs, JOINs across them, and writes a mart back to the lakehouse. Non-fatal like taxi.
    needs: changes
    if: ${{ github.event_name != 'workflow_dispatch' && needs.changes.outputs.multicatalog == 'true' || (github.event_name == 'workflow_dispatch' && (inputs.project == 'multicatalog' || inputs.project == 'all')) }}
    runs-on: ubuntu-latest
    concurrency:
      group: multicatalog-onelake
      cancel-in-progress: false
    env:
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun + pytest (pulls duckdb + deltalake)
        run: pip install -e . pytest
      - name: Multi-lakehouse dbt demo — local de-risk (network-free, always runs)
        # The dbt medallion across three catalogs, run against three local folders. Proves the
        # `catalogs:` + `+database` write/read/incremental paths before the OneLake steps below.
        run: |
          python -m pytest \
            tests/integration_tests/multicatalog/dbt/test_multicatalog_dbt.py \
            -q -p no:cacheprovider
      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Acquire a fresh OneLake bearer token
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          # The connection demo passes NO credentials (auto on OneLake, picked up from AZURE_STORAGE_TOKEN);
          # the dbt profile reads ONELAKE_TOKEN from storage_options.
          echo "AZURE_STORAGE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Multi-lakehouse dbt demo — LIVE OneLake (writes Bronze/Silver/Gold to THREE lakehouses)
        env:
          # Three real OneLake Lakehouse roots — the dbt project writes one medallion layer to each,
          # into an isolated schema so nothing else in the lakehouse is touched. Swap the GUIDs to
          # retarget. One ONELAKE_TOKEN (above) authenticates all three (same storage resource).
          LH_SILVER_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/7cb28f47-65bd-4aac-96c0-f7dd4eeb40ff/Tables
          LH_BRONZE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/6d4c75af-b240-449c-909e-e5b0c3ad241a/Tables
          LH_GOLD_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/4fb792e8-b2e6-431c-b2d3-36727410bea8/Tables
          DBT_SCHEMA: multicatalog_dbt_demo
          DUCKRUN_MULTICAT_DBT_PAGE: multicatalog_dbt_run.html
        run: python tests/integration_tests/multicatalog/demo_multicatalog_dbt.py
      - name: Upload the dbt multi-lakehouse HTML report (published as multicatalog_dbt.html)
        if: always() && hashFiles('multicatalog_dbt_run.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: docs-multicatalog-dbt-page
          path: multicatalog_dbt_run.html
          if-no-files-found: warn
      - name: Multi-catalog live demo (lakehouse + read-only warehouse + local scratch)
        env:
          # writable aemo lakehouse (the shared sample lakehouse) + the read-only Fabric Warehouse.
          WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/7cb28f47-65bd-4aac-96c0-f7dd4eeb40ff/Tables
          WAREHOUSE_RO_PATH: abfss://d5f25039-7f33-4668-b909-2c397b2626fb@onelake.dfs.fabric.microsoft.com/61bf56ea-a4d5-4895-a90e-a6daa6e02d04/Tables
          DUCKRUN_MULTICAT_SCHEMA: multicatalog_demo
          DUCKRUN_MULTICAT_PAGE: multicatalog_run.html   # the demo writes its full HTML report here
        run: python tests/integration_tests/multicatalog/demo_multicatalog.py

      - name: Upload this run's HTML report for deploy-docs to publish as multicatalog.html
        if: always() && hashFiles('multicatalog_run.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: docs-multicatalog-page
          path: multicatalog_run.html
          if-no-files-found: warn

  breaker:
    # A BLACK-BOX transactional-isolation check (tests/integration_tests/onelake_breaker/onelake_isolation.py)
    # against LIVE OneLake, Elle-style but pure Python (no JVM): concurrent workers append unique
    # tokens to a SMALL shared key pool via a self-referential UPDATE (the fenced read-modify-write
    # where a lost update would live), recording only what each client observed. The checker then
    # infers a ww/wr/rw dependency graph from that history and reports any CYCLE (G0/G1c/G-single/G2)
    # plus lost/garbage/aborted reads and lost updates — the verdict + QPS go to the step summary.
    # An optional concurrent VACUUM compactor interleaves layout commits with the appends.
    #
    # It writes to its OWN dedicated lakehouse ('duckrun_breaker'), created idempotently below (same
    # pattern as the Contoso benchmark's 'sqlbi' lakehouse) — NOT the shared lakehouse the other jobs
    # use — so the contention writes never touch anything else. Isolated schema (duckrun_breaker_it) +
    # concurrency lock on top of that.
    needs: changes
    if: ${{ github.event_name != 'workflow_dispatch' && needs.changes.outputs.breaker == 'true' || (github.event_name == 'workflow_dispatch' && (inputs.project == 'breaker' || inputs.project == 'all')) }}
    runs-on: ubuntu-latest
    concurrency:
      group: breaker-onelake
      cancel-in-progress: false
    env:
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun (pulls duckdb + deltalake)
        run: pip install -e ".[test]"
      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Create the dedicated 'duckrun_breaker' lakehouse (idempotent) + mint OneLake token
        # Fabric REST create-if-absent, then resolve its GUID and build WAREHOUSE_PATH from it. The
        # OIDC service principal already creates lakehouses in this workspace (the Contoso 'sqlbi'
        # lakehouse), so it has the rights. Schema-enabled so duckrun's Tables/<schema>/<table> layout
        # resolves, matching the other OneLake jobs. Reused across runs (never deleted) — the harness
        # drops+recreates its own tables each run.
        env:
          WS_ID: 1c52481c-0523-4a5a-bbde-fdc932bd77c2
          LH_NAME: duckrun_breaker
        run: |
          set -euo pipefail
          BASE="https://api.fabric.microsoft.com/v1/workspaces/$WS_ID/lakehouses"
          find_lh() {
            az rest --method get --resource https://api.fabric.microsoft.com --url "$BASE" \
              --query "value[?displayName=='$LH_NAME'].id | [0]" -o tsv 2>/dev/null
          }
          LH_ID="$(find_lh || true)"
          if [ -z "${LH_ID:-}" ] || [ "$LH_ID" = "None" ]; then
            echo "creating schema-enabled lakehouse '$LH_NAME' in workspace $WS_ID ..."
            az rest --method post --resource https://api.fabric.microsoft.com --url "$BASE" \
              --headers "Content-Type=application/json" \
              --body '{"displayName":"'"$LH_NAME"'","creationPayload":{"enableSchemas":true}}' >/dev/null || true
            for i in $(seq 1 12); do
              sleep 5
              LH_ID="$(find_lh || true)"
              if [ -n "${LH_ID:-}" ] && [ "$LH_ID" != "None" ]; then break; fi
              echo "  waiting for '$LH_NAME' to appear ($i/12)..."
            done
          else
            echo "lakehouse '$LH_NAME' already exists ($LH_ID) — reusing."
          fi
          if [ -z "${LH_ID:-}" ] || [ "$LH_ID" = "None" ]; then
            echo "lakehouse '$LH_NAME' was not visible after creation"; exit 1
          fi
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          {
            echo "ONELAKE_TOKEN=$TOKEN"
            echo "WAREHOUSE_PATH=abfss://$WS_ID@onelake.dfs.fabric.microsoft.com/$LH_ID/Tables"
          } >> "$GITHUB_ENV"
          echo "lakehouse '$LH_NAME' = $LH_ID"
      - name: Black-box isolation check (+ concurrent compaction) against the dedicated lakehouse
        # 6 workers contend on 8 keys; a VACUUM compactor interleaves. The checker infers the
        # dependency graph from observed reads/writes and fails the job on any anomaly witness.
        # WAREHOUSE_PATH comes from the create step above (the fresh lakehouse's GUID).
        env:
          DBT_SCHEMA: duckrun_breaker_it
        run: >-
          python tests/integration_tests/onelake_breaker/onelake_isolation.py
          --workers 6 --ops 25 --keys 8 --compact-interval 3 --seed 1
