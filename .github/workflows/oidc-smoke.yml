name: oidc-smoke

# Throwaway diagnostic (workflow_dispatch only): does GitHub Actions workload-identity federation
# actually mint a OneLake storage token here? Replicates auth._github_oidc_token step by step with
# FULL errors surfaced (the adapter swallows them as best-effort), so we can see exactly where it
# breaks — GitHub OIDC request vs Azure AD exchange — without waiting ~66 min for a tuva build.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun (+ azure-identity via [local])
        run: pip install -e ".[test,local]"
      - name: Diagnose the OIDC -> Azure AD storage-token exchange
        run: |
          python - <<'PY'
          import os, traceback
          from duckrun import auth

          def has(k): return "set" if os.environ.get(k) else "MISSING"
          print("ACTIONS_ID_TOKEN_REQUEST_URL   :", has("ACTIONS_ID_TOKEN_REQUEST_URL"))
          print("ACTIONS_ID_TOKEN_REQUEST_TOKEN :", has("ACTIONS_ID_TOKEN_REQUEST_TOKEN"))
          print("AZURE_CLIENT_ID                :", has("AZURE_CLIENT_ID"))
          print("AZURE_TENANT_ID                :", has("AZURE_TENANT_ID"))
          print("-" * 60)

          # 1) GitHub side: can we fetch a fresh OIDC assertion?
          assertion = None
          try:
              assertion = auth._github_oidc_assertion()
              print("github assertion:", ("OK len=%d" % len(assertion)) if assertion else "NONE (env missing)")
          except Exception:
              print("github assertion RAISED:")
              traceback.print_exc()

          # 2) Azure side: exchange it for a storage token (surface the real AAD error).
          if assertion:
              try:
                  from azure.identity import ClientAssertionCredential
                  cred = ClientAssertionCredential(
                      os.environ["AZURE_TENANT_ID"],
                      os.environ["AZURE_CLIENT_ID"],
                      auth._github_oidc_assertion,
                  )
                  tok = cred.get_token("https://storage.azure.com/.default").token
                  print("azure storage token: OK len=%d" % len(tok))
              except Exception:
                  print("azure exchange RAISED:")
                  traceback.print_exc()

          # 3) The public wrapper the adapter actually calls.
          final = auth._github_oidc_token()
          print("-" * 60)
          print("_github_oidc_token():", "OK" if final else "NONE")
          raise SystemExit(0 if final else 1)
          PY
