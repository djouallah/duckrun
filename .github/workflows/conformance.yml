name: conformance

# Runs the official dbt adapter conformance suite (dbt-labs/dbt-adapters) against duckrun and
# publishes a pass/fail report to the job summary. It is non-blocking: duckrun is a Delta-only
# adapter, so a number of standard tests are expected not to pass — the value is the report,
# not a green/red gate. Inspect the run summary to see exactly which suites pass.
#
# On pushes to `main` it also renders the card live into README.md (between the CONFORMANCE
# markers) and commits the result, so the README always reflects the latest run.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun + conformance deps (dbt-tests-adapter)
        run: pip install -e ".[conformance]"

      - name: Run official dbt adapter conformance suite (non-blocking)
        continue-on-error: true
        run: |
          pytest tests/conformance --tb=no -rA -p no:cacheprovider \
            --continue-on-collection-errors --junitxml=conformance.xml

      - name: Render conformance card
        if: always()
        run: python tools/conformance_summary.py conformance.xml > conformance_card.md

      - name: Publish pass/fail summary
        if: always()
        run: cat conformance_card.md >> "$GITHUB_STEP_SUMMARY"

      - name: Render card into README and commit (main only)
        if: always() && github.ref == 'refs/heads/main'
        run: |
          python tools/inject_readme.py README.md conformance_card.md CONFORMANCE
          if git diff --quiet -- README.md; then
            echo "README conformance card unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update conformance card in README [skip ci]"
          git push
