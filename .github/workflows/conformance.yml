name: conformance

# Runs the official dbt adapter conformance suite (dbt-labs/dbt-adapters) against duckrun. This is
# a REQUIRED check on every PR, gated on REGRESSIONS only: duckrun is a Delta-only adapter, so a
# number of standard tests are *expected* not to pass — what must not happen is a test that passes
# on main starting to fail. The "passing on main" set lives in tests/conformance/passing_baseline.txt
# and is auto-maintained here:
#   - on every PR:   run the suite, fail iff a baseline test regressed (tests/tools/conformance_baseline.py)
#   - on push main:  run the suite, refresh the baseline + render the card into README, commit both
# It also publishes the at-a-glance pass/fail card to the job summary every run.

on:
  # REQUIRED check, so it must run and report on EVERY pull request (a paths-filtered run never
  # reports, leaving the required check stuck "Expected"). The job always runs; the expensive
  # install + suite self-skip on docs-only changes and the job still reports green.
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  # Lets the publish workflow run this as a release gate (publish.yml).
  workflow_call:

permissions:
  contents: write

# Serialize: at most one conformance run at a time, queue the rest (no cancel). A STATIC group
# (not keyed by ref) is what makes a release tag's publish-called run wait behind an in-flight
# push-to-main run, instead of racing it — the README card + baseline commits on main can't
# tolerate two at once (the second push would be a non-fast-forward).
concurrency:
  group: conformance
  cancel-in-progress: false

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history to diff what changed (docs-only self-skip) and to commit back to main.
          fetch-depth: 0

      # The conformance result is a property of the code, not the docs. If a change touches nothing
      # but Markdown, skip the (multi-minute) install + suite and report green — the required check
      # is still satisfied and a docs change can't regress conformance. Any non-.md change runs it.
      - name: Detect whether code changed (vs docs-only)
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          if [ -z "$base" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "code=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if git diff --name-only "$base" "$head" | grep -qvE '\.md$'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "Docs-only change — skipping the conformance suite."
          fi

      - uses: actions/setup-python@v5
        if: steps.changes.outputs.code == 'true'
        with:
          python-version: '3.11'

      - name: Install duckrun + conformance deps (dbt-tests-adapter)
        if: steps.changes.outputs.code == 'true'
        run: pip install -e ".[conformance]"

      - name: Run official dbt adapter conformance suite
        if: steps.changes.outputs.code == 'true'
        # Per-test pass/fail is informational (duckrun can't pass every standard test); the gate is
        # the baseline-diff step below. continue-on-error so a known failure doesn't stop the job
        # before we render the card and run the regression check.
        continue-on-error: true
        run: |
          pytest tests/conformance --tb=no -rA -p no:cacheprovider \
            --continue-on-collection-errors --junitxml=conformance.xml

      - name: Render conformance card
        if: always() && steps.changes.outputs.code == 'true'
        run: python tests/tools/conformance_summary.py conformance.xml > docs/conformance_card.md

      - name: Publish pass/fail summary
        if: always() && steps.changes.outputs.code == 'true'
        run: cat docs/conformance_card.md >> "$GITHUB_STEP_SUMMARY"

      # THE GATE: fail iff a test that passes on main (tests/conformance/passing_baseline.txt) is no
      # longer passing here. Known failures are tolerated; new passes never block. No-op (green)
      # until the baseline file is committed. Runs on every code change — no continue-on-error.
      - name: Gate on conformance regressions (baseline diff)
        if: steps.changes.outputs.code == 'true'
        run: python tests/tools/conformance_baseline.py check tests/conformance/passing_baseline.txt conformance.xml

      # On push to main: this run IS the latest state of main, so refresh the baseline + render the
      # card into the docs and commit both. That's what keeps the card always reflecting main.
      # [skip ci] avoids re-triggering. Never fails the push on a commit hiccup.
      # IMPORTANT: no `always()` — this must run ONLY when the gate above passed. Otherwise a
      # regression on main would auto-lower the baseline (drop the now-failing test) and commit it,
      # silently absorbing the very regression the gate just caught.
      - name: Refresh baseline + render card into docs and commit (main only)
        if: steps.changes.outputs.code == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          python tests/tools/conformance_baseline.py update tests/conformance/passing_baseline.txt conformance.xml
          python tests/tools/inject_readme.py docs/conformance.md docs/conformance_card.md CONFORMANCE
          if git diff --quiet -- docs/conformance.md tests/conformance/passing_baseline.txt; then
            echo "Conformance card + baseline unchanged."
            exit 0
          fi
          git config user.name "djouallah"
          git config user.email "mimoune.djouallah@gmail.com"
          git add docs/conformance.md tests/conformance/passing_baseline.txt
          git commit -m "docs: refresh conformance card + baseline [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            sleep 3
          done
