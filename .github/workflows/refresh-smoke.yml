name: refresh-smoke

# Throwaway diagnostic (workflow_dispatch only): exercise the FULL OneLake token-refresh+re-mint path
# on every model of a fast jaffle build (~30s), instead of waiting ~66 min for tuva to hit real expiry.
# DUCKRUN_AUTH_FORCE_REFRESH makes every configure_cursor treat the token as expiring, so it re-mints
# the DuckDB secret + swaps storage_options on each model; DUCKRUN_AUTH_DEBUG prints the decisions.
# If this build + diff stays green, the refresh wiring is sound and any tuva failure is a coverage/
# timing gap, not a broken re-mint.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  refresh-smoke:
    runs-on: ubuntu-latest
    env:
      WAREHOUSE_PATH: abfss://1c52481c-0523-4a5a-bbde-fdc932bd77c2@onelake.dfs.fabric.microsoft.com/6d4c75af-b240-449c-909e-e5b0c3ad241a/Tables
      DBT_SCHEMA: parity_refreshsmoke
      AZURE_TRANSPORT_OPTION_TYPE: curl
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      DUCKRUN_AUTH_DEBUG: "1"
      DUCKRUN_AUTH_FORCE_REFRESH: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun
        run: pip install -e ".[test,local]"
      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Acquire the initial OneLake bearer token
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: jaffle build to OneLake with forced per-model token refresh
        run: python parity_tests/jaffle_shop/run_parity.py
