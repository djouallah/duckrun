name: jaffle

# Industry-standard, GATING end-to-end test. Builds the canonical dbt-labs "jaffle shop"
# project (jaffle_shop/) on duckrun over a local Delta warehouse, then drives a two-pass
# incremental merge and asserts the upsert landed correctly. Unlike conformance.yml (a
# non-blocking report), this is a real regression gate for duckrun's Delta merge path on a
# controlled, reproducible dataset. It is fully independent of integration.yml (the AEMO
# workflow) and shares no files with it.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  jaffle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jaffle_shop
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/jaffle_shop
      WAREHOUSE_PATH: ${{ github.workspace }}/jaffle_warehouse
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install duckrun (pulls dbt-duckdb + duckdb + deltalake)
        working-directory: ${{ github.workspace }}
        run: pip install -e .

      - name: Seed canonical jaffle_shop data
        run: dbt seed

      - name: Build pass 1 (full refresh — 99 base orders land in Delta)
        # Merge-correctness assertions only hold after the increment, so hold them back here.
        run: dbt build --exclude tag:merge_assertion

      - name: Build pass 2 (incremental Delta merge + gating merge assertions)
        # No --exclude here: the merge-assertion tests now run in the same process that just
        # materialized fct_orders, so its delta_scan view is registered for them to read.
        # They only hold after the increment, hence pass 1 above excludes them.
        # Block scalar so YAML doesn't read the '{...: ...}' vars as a nested mapping.
        run: |
          dbt build --vars '{jaffle_increment: true}'
