name: integration_tests_iceberg

# The live Iceberg gate: the coffee integration dbt project built UNMODIFIED against a Fabric
# lakehouse's **Iceberg REST catalog** (profile target 'iceberg' → duckrun's `format: iceberg`,
# which expands into dbt-duckdb's own attach:/secrets: blocks — DuckDB is the whole engine there),
# then every produced table read back through duckrun.connect(format='iceberg').
#
# It writes to its OWN dedicated lakehouse ('duckrun_iceberg'), created idempotently below (the
# same pattern as the breaker's 'duckrun_breaker' lakehouse) — NOT the shared Delta lakehouse the
# other integration jobs use — so Iceberg writes can never touch a Delta table. Isolated schema +
# a concurrency lock on top. Like the other live-OneLake suites this is NOT a release gate.
on:
  push:
    branches: ["**"]
    paths:
      - 'duckrun/iceberg.py'
      - 'dbt/adapters/duckrun/credentials.py'
      - 'dbt/include/duckrun/**'
      - 'tests/integration_tests/coffee/**'
      - '.github/workflows/integration_tests_iceberg.yml'
  workflow_dispatch:

# id-token so duckrun (and azure/login) can exchange a GitHub OIDC assertion for tokens.
permissions:
  contents: read
  id-token: write

jobs:
  iceberg:
    runs-on: ubuntu-latest
    concurrency:
      group: iceberg-onelake
      cancel-in-progress: false
    env:
      # duckrun self-acquires every OneLake/Fabric token from this OIDC identity — no az token steps.
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      DBT_PROFILES_DIR: ${{ github.workspace }}/tests/integration_tests/coffee
      DBT_SCHEMA: coffee_iceberg_it
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install duckrun + pytest
        run: pip install -e ".[test]"
      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Create the dedicated 'duckrun_iceberg' lakehouse (idempotent)
        # Fabric REST create-if-absent, then resolve its GUID and build WAREHOUSE_PATH from it —
        # the same flow as the breaker's dedicated lakehouse. Schema-enabled is REQUIRED for the
        # Iceberg REST catalog. Reused across runs (never deleted).
        env:
          WS_ID: 1c52481c-0523-4a5a-bbde-fdc932bd77c2
          LH_NAME: duckrun_iceberg
        run: |
          set -euo pipefail
          BASE="https://api.fabric.microsoft.com/v1/workspaces/$WS_ID/lakehouses"
          find_lh() {
            az rest --method get --resource https://api.fabric.microsoft.com --url "$BASE" \
              --query "value[?displayName=='$LH_NAME'].id | [0]" -o tsv 2>/dev/null
          }
          LH_ID="$(find_lh || true)"
          if [ -z "${LH_ID:-}" ] || [ "$LH_ID" = "None" ]; then
            echo "creating schema-enabled lakehouse '$LH_NAME' in workspace $WS_ID ..."
            az rest --method post --resource https://api.fabric.microsoft.com --url "$BASE" \
              --headers "Content-Type=application/json" \
              --body '{"displayName":"'"$LH_NAME"'","creationPayload":{"enableSchemas":true}}' >/dev/null || true
            for i in $(seq 1 12); do
              sleep 5
              LH_ID="$(find_lh || true)"
              if [ -n "${LH_ID:-}" ] && [ "$LH_ID" != "None" ]; then break; fi
              echo "  waiting for '$LH_NAME' to appear ($i/12)..."
            done
          else
            echo "lakehouse '$LH_NAME' already exists ($LH_ID) — reusing."
          fi
          if [ -z "${LH_ID:-}" ] || [ "$LH_ID" = "None" ]; then
            echo "lakehouse '$LH_NAME' was not visible after creation"; exit 1
          fi
          echo "WAREHOUSE_PATH=$WS_ID/$LH_ID" >> "$GITHUB_ENV"   # OneLake <workspace>/<item> shorthand
          echo "lakehouse '$LH_NAME' = $LH_ID"
      - name: dbt build — coffee on the Iceberg REST catalog (models + tests)
        working-directory: tests/integration_tests/coffee
        env:
          COFFEE_ROWS: "10000"
        run: dbt build --target iceberg
      - name: Read every table back via duckrun.connect(format='iceberg')
        env:
          COFFEE_ROWS: "10000"
        run: |
          python - <<'PY'
          import os, duckrun
          conn = duckrun.connect(os.environ["WAREHOUSE_PATH"], format="iceberg",
                                 schema=os.environ["DBT_SCHEMA"])
          for t in ("dim_locations", "dim_products", "products", "fact_sales", "mart_revenue"):
              n = conn.sql(f'select count(*) from "{t}"').fetchone()[0]
              print(f"{t}: {n} rows")
              assert n > 0, f"{t} came back empty"
          n = conn.sql('select count(*) from fact_sales').fetchone()[0]
          assert n == int(os.environ["COFFEE_ROWS"]), f"fact_sales has {n} rows"
          conn.close()
          PY
