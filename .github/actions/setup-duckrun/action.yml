name: setup-duckrun
description: >
  Set up Python and install duckrun with the requested extras. The one setup block every job
  uses (checkout must have already run — a local action can only load after it).
inputs:
  python-version:
    description: Python version to set up
    required: false
    default: '3.11'
  extras:
    description: pip extras group (duckrun installs as -e ".[<extras>]")
    required: false
    default: 'test'
  extra-packages:
    description: Optional extra pip packages to install after duckrun (e.g. tpchgen-cli)
    required: false
    default: ''
runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install duckrun + deps
      shell: bash
      run: |
        pip install -e ".[${{ inputs.extras }}]"
        if [ -n "${{ inputs.extra-packages }}" ]; then
          pip install ${{ inputs.extra-packages }}
        fi
