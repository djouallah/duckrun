name: 'jaffle_shop'
version: '1.0.0'

# Self-contained, industry-standard dbt project (the canonical dbt-labs "jaffle shop")
# pointed at duckrun. It is intentionally separate from integration_tests/ (the AEMO
# workflow) and exists to gate the Delta write + incremental-merge path against a
# recognisable, reproducible dataset. See .github/workflows/jaffle.yml.
profile: 'jaffle_shop'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]

clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  jaffle_shop:
    +quote_columns: false

models:
  jaffle_shop:
    staging:
      +materialized: view
    marts:
      # dim_customers overwrites a Delta table every run; fct_orders overrides this to
      # incremental in its own config (merge on order_id).
      +materialized: table
