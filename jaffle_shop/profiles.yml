jaffle_shop:
  target: dev
  outputs:
    dev:
      type: duckrun
      # threads is forced to 1 by the adapter regardless; kept here for clarity.
      threads: 1
      schema: jaffle
      settings:
        preserve_insertion_order: false
      # delta_rs writes land as <root_path>/<schema>/<model>; existing Delta tables are
      # surfaced back as delta_scan views, so {{ this }} / is_incremental() resolve across
      # the two separate `dbt build` processes the CI runs.
      root_path: "{{ env_var('WAREHOUSE_PATH', './jaffle_warehouse') }}"
