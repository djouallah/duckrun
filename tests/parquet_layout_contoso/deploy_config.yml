# Fabric workspace / lakehouse targets for the Contoso parquet-layout benchmark. Read by deploy.py
# (--env) and the parquet_layout_contoso.yml workflow to resolve the workspace + lakehouse.
#
# NOTE: `ws` is a Fabric workspace GUID — an identifier, NOT a secret. Auth is separate (OIDC:
# AZURE_CLIENT_ID / AZURE_TENANT_ID GitHub secrets). The federated identity must be granted access
# to the workspace below for the benchmark to run.
#
# Contoso lands in its OWN dedicated lakehouse `sqlbi` (created idempotently by the workflow),
# isolated from the AEMO benchmark's `data` lakehouse. Same workspace as AEMO by default.
defaults:
  lakehouse_name: "sqlbi"

main:
  ws: "91588e42-0f1c-4e56-bcaa-cbf015b8f312"

production:
  ws: "be079b0f-3416-4de2-9184-9c546bad223c"
