version: 2

models:
  - name: fct_price
    description: Price data from daily AEMO dispatch files
    columns:
      - name: REGIONID
        tests:
          - not_null
          - accepted_values:
              values: ['QLD1', 'NSW1', 'VIC1', 'SA1', 'TAS1', 'WA1']
      - name: SETTLEMENTDATE
        tests:
          - not_null
      - name: file
        tests:
          - not_null

  - name: fct_scada
    description: SCADA data from daily AEMO dispatch files
    columns:
      - name: DUID
        tests:
          - not_null
          - relationships:
              to: ref('dim_duid')
              field: DUID
              config:
                severity: warn
      - name: SETTLEMENTDATE
        tests:
          - not_null
      - name: file
        tests:
          - not_null

  - name: fct_price_today
    description: Intraday price data from AEMO dispatch files
    columns:
      - name: REGIONID
        tests:
          - not_null
          - accepted_values:
              values: ['QLD1', 'NSW1', 'VIC1', 'SA1', 'TAS1', 'WA1']
      - name: SETTLEMENTDATE
        tests:
          - not_null
      - name: file
        tests:
          - not_null

  - name: fct_scada_today
    description: Intraday SCADA data from AEMO dispatch files
    columns:
      - name: DUID
        tests:
          - not_null
      - name: SETTLEMENTDATE
        tests:
          - not_null
      - name: file
        tests:
          - not_null

  - name: fct_summary
    description: Combined SCADA and price summary
    columns:
      - name: date
        tests:
          - not_null:
              config:
                tags: [heavy]
      - name: DUID
        tests:
          - not_null:
              config:
                tags: [heavy]
          - relationships:
              to: ref('dim_duid')
              field: DUID
              config:
                tags: [heavy]
      - name: mw
        tests:
          - not_null:
              config:
                tags: [heavy]
      - name: price
        tests:
          - not_null:
              config:
                tags: [heavy]
