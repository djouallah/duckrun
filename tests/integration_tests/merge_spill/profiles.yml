merge_spill_bench:
  target: dev
  outputs:
    dev:
      type: duckrun
      threads: 1
      schema: "{{ env_var('DBT_SCHEMA', 'mart') }}"
      # Local-filesystem Delta warehouse (no OneLake): delta_rs writes land at
      # <root_path>/<schema>/<model>. The runner converts the big TPCH target into that same
      # path so the model resolves as incremental. duckrun sets preserve_insertion_order=false
      # and the cgroup-aware memory_limit itself, so large merges don't OOM.
      root_path: "{{ env_var('WAREHOUSE_PATH') }}"
    # The small-N OneLake target (the merge-onelake integration job). Identical to dev but writes
    # to abfss://… and carries the bearer_token so delta_rs can authenticate to OneLake. Kept a
    # SEPARATE output so the local dev target never passes an (empty) storage_options block — only
    # this one, used solely with WAREHOUSE_PATH=abfss://…, ever does.
    onelake:
      type: duckrun
      threads: 1
      schema: "{{ env_var('DBT_SCHEMA', 'mart') }}"
      root_path: "{{ env_var('WAREHOUSE_PATH') }}"
      storage_options:
        bearer_token: "{{ env_var('ONELAKE_TOKEN', '') }}"
