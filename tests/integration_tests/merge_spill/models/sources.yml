version: 2

sources:
  - name: tpch
    description: >
      TPCH data generated on the runner by the generate_data model (tpchgen-cli), scanned as
      parquet. duckrun resolves a plugin source as a CREATE OR REPLACE VIEW over read_parquet, so
      downstream models stream straight from the files — no 120M-row in-memory stage.
    tables:
      - name: lineitem
        description: >
          Big TPCH lineitem parquet generated into MERGE_SPILL_GEN. The mixed_upsert seed reads this
          (a lazy view) instead of a Delta base table, so the merge chain never materializes the
          whole fact in RAM. generate_data must run first to produce the files.
        meta:
          plugin: duckrun
          format: parquet
          location: "{{ env_var('MERGE_SPILL_GEN', '/tmp/merge_spill_gen') }}/lineitem/*.parquet"
