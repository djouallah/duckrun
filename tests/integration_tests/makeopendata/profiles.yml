makeopendata:
  target: dev
  outputs:
    # Local-filesystem Delta warehouse by default (no OneLake needed). delta_rs writes land at
    # <root_path>/<schema>/<model>; existing Delta tables are surfaced back as delta_scan views so
    # ref()/source() resolve. Point WAREHOUSE_PATH at an abfss:// Tables path + set ONELAKE_TOKEN to
    # run the same project against a Microsoft Fabric Lakehouse (OneLake).
    dev:
      type: duckrun
      threads: 1                       # duckrun serializes the Delta write path; pin to 1.
      schema: "{{ env_var('DBT_SCHEMA', 'prepare') }}"
      root_path: "{{ env_var('WAREHOUSE_PATH', './warehouse') }}"
      storage_options:
        bearer_token: "{{ env_var('ONELAKE_TOKEN', '') }}"
    production:
      type: duckrun
      threads: 1
      schema: "{{ env_var('DBT_SCHEMA', 'prepare') }}"
      root_path: "{{ env_var('WAREHOUSE_PATH', './warehouse') }}"
      storage_options:
        bearer_token: "{{ env_var('ONELAKE_TOKEN', '') }}"
