      - name: shape_iris_2024
        # National IRIS contours from Opendatasoft "georef-france-iris", read over https as the
        # GeoParquet export: geo_shape is native GEOMETRY (EPSG:4326) and the read is robust (the
        # JSON export is a dynamically-generated stream that httpfs corrupts mid-flight). The dev
        # target scopes IRIS to Hérault (dep 34) — matching the dvf_dev sample — while everything
        # else (communes/departements via national cog_* + the 13 MB communes GeoParquet) stays
        # national. production reads all of France (heavy; intended for the full manual build).
        meta:
          plugin: duckrun
          format: parquet
          location: "https://public.opendatasoft.com/api/explore/v2.1/catalog/datasets/georef-france-iris/exports/parquet{{ '?where=dep_code%3D%2734%27' if target.name != 'production' else '' }}"
        description: ""
        columns:
          - name: ID
            description: "Identifiant unique de l'entrée"
            data_type: text
          - name: INSEE_COM
            description: "Code INSEE de la commune"
            data_type: text
          - name: NOM_COM
            description: "Nom de la commune"
            data_type: text
          - name: IRIS
            description: "Code IRIS"
            data_type: text
          - name: CODE_IRIS
            description: "Code unique de l'IRIS"
            data_type: text
          - name: NOM_IRIS
            description: "Nom de l'IRIS"
            data_type: text
          - name: TYP_IRIS
            description: "Type d'IRIS"
            data_type: text
          - name: geometry
            description: "Géométrie associée à l'IRIS"
            data_type: geometry


