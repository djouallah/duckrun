        description: "Base officielle des codes postaux. Producteur des données: La Poste. Origine: https://www.data.gouv.fr/fr/datasets/base-officielle-des-codes-postaux/"
        columns:
          - name: code_postal
            description: "Postal code"
            data_type: string
