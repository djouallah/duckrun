coffee_shop:
  target: dev
  outputs:
    dev:
      type: duckrun
      schema: "{{ env_var('DBT_SCHEMA', 'dbo') }}"
      # Local-filesystem Delta warehouse by default (no OneLake needed). delta_rs writes land at
      # <root_path>/<schema>/<model>; existing tables come back as delta_scan views so ref() resolves.
      # Point WAREHOUSE_PATH at an abfss:// Tables path to run it against OneLake — duckrun acquires the
      # OneLake token itself (Fabric notebook runtime / GitHub OIDC / az login), so no bearer_token is
      # needed here.
      root_path: "{{ env_var('WAREHOUSE_PATH') }}"
    iceberg:
      # The SAME project against a lakehouse's Iceberg REST catalog (format: iceberg — DuckDB is
      # the whole engine; duckrun contributes token + ATTACH). integration_tests_iceberg.yml runs
      # this against the dedicated 'duckrun_iceberg' lakehouse.
      type: duckrun
      format: iceberg
      schema: "{{ env_var('DBT_SCHEMA', 'dbo') }}"
      root_path: "{{ env_var('WAREHOUSE_PATH') }}"
