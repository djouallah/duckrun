---
# Ported from josephmachado/simple_dbt_project onto the duckrun adapter.
# Showcases SCD2 snapshots, incremental (merge) models, an OBT/medallion build,
# dbt packages, exposures, and custom + generic tests — all materialized as Delta.
name: sde_dbt_tutorial
version: 1.0.0
config-version: 2

profile: sde_dbt_tutorial

flags:
  send_anonymous_usage_stats: false

model-paths: [models]
analysis-paths: [analysis]
test-paths: [tests]
seed-paths: [data]
macro-paths: [macros]
snapshot-paths: [scd2] # dbt snapshot -> SCD2 logic lives here
target-path: target
clean-targets:
  - target
  - dbt_packages

# Materializations.
#  - bronze stays as views (rebuilt each `dbt build`, consumed in-process).
#  - silver/gold land as Delta tables so they persist across the two-phase run.
#  - gold/marketing (the pivot) stays a view.
models:
  sde_dbt_tutorial:
    bronze:
      +materialized: view
    silver:
      +materialized: table
    gold:
      +materialized: table
      marketing:
        +materialized: view
