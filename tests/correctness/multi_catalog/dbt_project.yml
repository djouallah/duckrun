name: multi_catalog
version: "1.0"
config-version: 2
profile: multi_catalog

model-paths: ["models"]

models:
  multi_catalog:
    +materialized: table

seeds:
  multi_catalog:
    # Seeds land in the natively-attached catalog — the local guard for the format: iceberg seed
    # path (temp-stage + CTAS; the default seed's COPY doesn't work on an Iceberg catalog).
    +database: nat
