name: 'dbt_unit_tests'
version: '1.0.0'

profile: 'dbt_unit_tests'

model-paths: ["models"]
seed-paths: ["seeds"]

clean-targets:
  - "target"
  - "dbt_packages"

# A small, realistic jaffle-style project (seeds -> staging -> marts with real business logic, incl.
# the email-validation `dim_customers`) that materializes REAL Delta tables through duckrun. Its
# point is to carry dbt NATIVE unit tests (the `unit_tests:` given/expect blocks in
# models/marts/_unit_tests.yml) with explicit value rows — run on duckrun via `dbt build`.
models:
  dbt_unit_tests:
    +materialized: table
    # The incremental/ marts exercise every duckrun incremental strategy (merge / insert /
    # delete+insert / append / append_if_unchanged / microbatch) through a real two-run dbt build -- see
    # the harness for the per-strategy row-content assertions.
    incremental:
      +materialized: incremental

seeds:
  dbt_unit_tests:
    raw_orders:
      # Without this, CSV inference reads amount as an integer type, so a unit-test fixture value
      # like 99.99 rounds to 100 and the is_large_order boundary test is wrong. Pin it to double.
      +column_types:
        amount: double
    raw_events:
      # Same reasoning as raw_orders (amount stays double); event_ts is the microbatch event_time,
      # so pin it to timestamp rather than letting CSV inference pick a type.
      +column_types:
        amount: double
        event_ts: timestamp
