# Fabric workspace / lakehouse targets for the parquet-layout benchmark. Read by
# deploy_vorder.py (--env) and the parquet_layout.yml workflow to resolve the workspace + lakehouse.
# NOTE: `ws` / `lakehouse` are Fabric workspace/lakehouse GUIDs — identifiers, NOT secrets. Auth is
# separate (OIDC: AZURE_CLIENT_ID / AZURE_TENANT_ID GitHub secrets). The federated identity must be
# granted access to the workspace below for the benchmark to run.
defaults:
  lakehouse_name: "duckrun"

main:
  # The aemo integration CI's own workspace + `duckrun` lakehouse (7cb28f47…) — the benchmark reads
  # the mart.fct_summary that the aemo CI builds here, so it stays self-contained instead of pointing
  # at an external workspace.
  ws: "1c52481c-0523-4a5a-bbde-fdc932bd77c2"

production:
  ws: "be079b0f-3416-4de2-9184-9c546bad223c"
  lakehouse_name: "data"
